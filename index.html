<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Fallera Calavera — Entraînement guidé</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=IM+Fell+English+SC&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #e8dcc0;
    --paper-dark: #d8c8a0;
    --paper-darker: #c4b282;
    --ink: #2a1d12;
    --ink-soft: #5c4a36;
    --char: #1a120a;
    --flame: #c4501e;
    --flame-dark: #8a3414;
    --flame-light: #e8762e;
    --blood: #8a2418;
    --blood-dark: #5c1610;
    --gold: #a87a28;
    --gold-dark: #6e4e18;
    --bone: #f0e8d4;
    --night: #524232;
    --night-light: #6e5a42;
    --sickly: #7a8a4a;
    --sickly-dark: #4a5a28;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Special Elite', 'Courier New', monospace;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(196,80,30,0.14), transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(138,36,24,0.10), transparent 50%),
      #3d3220;
    background-attachment: fixed;
    color: var(--paper);
    padding: 1.5rem;
    line-height: 1.55;
  }
  .wrap { max-width: 1240px; margin: 0 auto; }
  .game-layout { display: grid; grid-template-columns: 1fr 320px; gap: 1.75rem; align-items: start; }
  .game-main { min-width: 0; }
  .log-sidebar {
    position: sticky; top: 1.5rem;
    max-height: calc(100vh - 3rem);
    display: flex; flex-direction: column;
    background: linear-gradient(165deg, var(--night-light), var(--night));
    border: 1px solid var(--gold-dark); border-radius: 4px;
    padding: 14px 16px;
    overflow: hidden;
  }
  .log-sidebar .section-title { margin-top: 0; }
  .ai-level-bar {
    display: flex; flex-direction: column; gap: 7px;
    margin-bottom: 12px; flex-shrink: 0;
  }
  .ctrl-row { display: flex; align-items: center; gap: 8px; }
  .ai-level-label {
    font-family: 'IM Fell English SC', serif; font-size: 0.82rem;
    color: var(--paper-darker); flex-shrink: 0; min-width: 76px;
  }
  .ai-lvl-btn {
    font-family: 'Special Elite', monospace; font-size: 0.82rem; padding: 5px 9px;
    border-radius: 3px; border: 1px solid var(--gold-dark);
    background: linear-gradient(160deg, var(--night-light), var(--night));
    color: var(--paper); cursor: pointer; transition: all 0.15s; flex: 1;
  }
  .ai-lvl-btn:hover { border-color: var(--gold); color: #fff; }
  .sidebar-log-zone { display: flex; flex-direction: column; flex: 0 1 auto; max-height: 38vh; min-height: 80px; }
  .log-sidebar .log { border-top: none; padding-top: 0; margin-top: 0; overflow-y: auto; flex: 1; min-height: 0; }
  .sidebar-divider { border-top: 1px dashed var(--gold-dark); margin: 12px 0; flex-shrink: 0; }
  .sidebar-aside-zone { display: flex; flex-direction: column; flex: 1 1 auto; min-height: 0; overflow-y: auto; }
  .sidebar-aside-zone:empty { display: none; }
  .sidebar-aside-zone > *:first-child { margin-top: 0; }
  @media (max-width: 880px) {
    .game-layout { grid-template-columns: 1fr; }
    .log-sidebar { position: static; max-height: none; overflow: visible; }
    .sidebar-log-zone { max-height: 320px; }
    .sidebar-aside-zone { max-height: none; overflow: visible; }
  }
  h1 {
    font-family: 'Pirata One', 'Special Elite', cursive;
    font-size: 2.4rem; margin: 0 0 0.1rem; font-weight: 400;
    color: var(--flame-light);
    text-shadow: 2px 2px 0 var(--char), 0 0 18px rgba(196,80,30,0.35);
    letter-spacing: 0.03em;
  }
  .subtitle { font-family: 'IM Fell English SC', serif; color: var(--paper-darker); font-size: 0.95rem; margin: 0 0 1.5rem; letter-spacing: 0.02em; }

  .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; flex-wrap: wrap; gap: 8px; }
  /* ── Taille du plateau ── */
  /* On scale font-size sur html → tous les rem bougent (cartes, textes, badges…)
     La sidebar reste fixée en 14px pour rester lisible quelle que soit la taille choisie. */
  html { font-size: 16px; }
  .log-sidebar { font-size: 13px !important; }
  .log-sidebar * { font-size: inherit; }
  /* Les sélecteurs de la sidebar eux-mêmes restent fixes */
  .ai-lvl-btn { font-size: 13px !important; }
  .ai-level-label { font-size: 13px !important; }

  /* ── Bouton Almoina ── */
  .almoina-bar { margin: 0.6rem 0 0.9rem; }
  .almoina-btn {
    width: 100%; padding: 10px 14px;
    font-family: 'IM Fell English SC', serif; font-size: 1rem;
    color: var(--paper); cursor: pointer;
    background: linear-gradient(160deg, var(--night-light), var(--night));
    border: 1.5px solid var(--gold-dark); border-radius: 4px;
    letter-spacing: 0.04em; transition: all 0.15s;
  }
  .almoina-btn:not(:disabled):hover {
    border-color: var(--gold); background: linear-gradient(160deg, #3a3010, var(--night-light));
    color: #fff; box-shadow: 0 0 8px rgba(200,160,50,0.3);
  }
  .almoina-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .badge {
    font-family: 'IM Fell English SC', serif;
    font-size: 0.85rem; color: var(--paper);
    background: linear-gradient(160deg, var(--night-light), var(--night));
    border: 1px solid var(--gold-dark);
    border-radius: 3px; padding: 5px 12px;
    box-shadow: inset 0 0 0 1px rgba(168,122,40,0.2);
  }
  .badge.alert {
    border-color: var(--flame-light);
    background: linear-gradient(160deg, #4a2410, #3a1808);
    box-shadow: inset 0 0 0 1px rgba(232,118,46,0.35), 0 0 8px rgba(232,118,46,0.25);
  }

  .guide-box {
    background: linear-gradient(160deg, #1c2e3a, #142026);
    border: 1px solid #4a7a96; border-left: 4px solid #4a7a96;
    border-radius: 3px; padding: 12px 16px; margin-bottom: 1.25rem;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .guide-box .icon { font-size: 1.3rem; line-height: 1; filter: grayscale(0.3); }
  .guide-box p { margin: 0; font-size: 0.88rem; color: #cfe3f0; line-height: 1.55; }
  .guide-box .guide-title { font-family: 'IM Fell English SC', serif; font-weight: 400; letter-spacing: 0.04em; color: #8fc4e0; margin-bottom: 4px; font-size: 0.92rem; text-transform: uppercase; }
  .toggle-guide { font-size: 0.72rem; color: var(--paper-darker); background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0; margin-top: 6px; font-family: inherit; }

  .section-title {
    font-family: 'IM Fell English SC', serif;
    font-size: 1rem; color: var(--gold);
    letter-spacing: 0.06em; margin: 1.1rem 0 0.5rem;
    border-bottom: 1px solid var(--gold-dark); padding-bottom: 3px;
    display: flex; align-items: baseline; justify-content: space-between; gap: 10px; flex-wrap: wrap;
  }
  .hand-count {
    font-family: 'Special Elite', monospace;
    font-size: 0.74rem; color: var(--paper-darker);
    font-weight: 400; letter-spacing: 0;
    background: linear-gradient(160deg, var(--night-light), var(--night));
    border: 1px solid var(--gold-dark); border-radius: 3px;
    padding: 2px 9px;
  }
  .hand-count.alert {
    border-color: var(--flame-light); color: #ffd8b0;
    background: linear-gradient(160deg, #4a2410, #3a1808);
    box-shadow: 0 0 6px rgba(232,118,46,0.25);
  }

  .counter-area {
    display: flex; flex-wrap: wrap; align-content: flex-start; gap: 12px;
    min-height: 96px; height: auto; padding: 14px;
    background:
      repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0 2px, transparent 2px 6px),
      linear-gradient(160deg, var(--paper), var(--paper-dark));
    border-radius: 4px; border: 1px solid var(--gold-dark);
    box-shadow: inset 0 0 24px rgba(42,29,18,0.25);
  }
  .empty-hint { font-family: 'IM Fell English SC', serif; color: var(--ink-soft); font-size: 0.9rem; padding: 6px; align-self: center; font-style: italic; }

  .playcard {
    width: 168px; min-height: 226px; border-radius: 6px; position: relative;
    display: flex; flex-direction: column; padding: 11px 10px;
    border: 2px solid; flex-shrink: 0; user-select: none;
    box-shadow: 2px 3px 0 rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.06);
  }
  .playcard.mini { width: 150px; min-height: 200px; padding: 9px 8px; }

  /* Trésor générique (fallback) */
  .playcard.treasure {
    background: linear-gradient(165deg, var(--paper), var(--paper-darker));
    border-color: var(--gold-dark); color: var(--ink);
  }
  /* Sous-type Ingrédient : c'est l'objectif de victoire, on le distingue par un
     liseré vert "appétissant" et un fond légèrement plus chaud */
  .playcard.treasure.is-ingredient {
    background: linear-gradient(165deg, #ecdfb8, #d8c488);
    border-color: var(--sickly-dark); border-width: 3px;
    box-shadow: 2px 3px 0 rgba(0,0,0,0.35), inset 0 0 0 2px rgba(122,138,74,0.35);
  }
  /* Sous-type Trésor de vente (étoile) : liseré bleu-gris, façon pièce de monnaie */
  .playcard.treasure.is-sellable {
    background: linear-gradient(165deg, #d8d0bc, #c0b496);
    border-color: #6a7888;
  }
  /* Sous-type Autre trésor à effet passif : liseré violet-brun, façon objet enchanté */
  .playcard.treasure.is-passive {
    background: linear-gradient(165deg, #d8c8a8, #b8a070);
    border-color: #7a5a9e;
  }

  .playcard.battle {
    background: linear-gradient(165deg, #4a1c14, #2e0f0a);
    border-color: var(--blood); color: var(--bone);
  }
  .playcard.special {
    background: linear-gradient(165deg, #2c2438, #181420);
    border-color: #6a5a96; color: var(--bone);
  }

  .pc-category {
    font-family: 'Special Elite', monospace; font-size: 0.56rem;
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 4px; opacity: 0.8; font-weight: 700;
  }
  .playcard.is-ingredient .pc-category { color: var(--sickly-dark); }
  .playcard.is-sellable .pc-category { color: #4a5868; }
  .playcard.is-passive .pc-category { color: #5a3e7e; }
  .playcard.battle .pc-category { color: #e8a888; }
  .playcard.special .pc-category { color: #b8a8e0; }

  .pc-skull {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; margin-bottom: 6px; border: 2px solid;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.2);
  }
  .playcard.mini .pc-skull { width: 20px; height: 20px; font-size: 11px; }
  .playcard.treasure .pc-skull { background: var(--gold); color: var(--char); border-color: var(--gold-dark); }
  .playcard.is-ingredient .pc-skull { background: var(--sickly); color: #182008; border-color: var(--sickly-dark); }
  .playcard.is-sellable .pc-skull { background: #8a9aac; color: #1a2228; border-color: #5a6878; }
  .playcard.is-passive .pc-skull { background: #9a7ec0; color: #221830; border-color: #7a5a9e; }
  .playcard.battle .pc-skull { background: var(--blood); color: var(--bone); border-color: #c44; }
  .playcard.special .pc-skull { background: #6a5a96; color: var(--bone); border-color: #8a7ab8; }

  .pc-name {
    font-family: 'IM Fell English SC', serif;
    font-size: 0.82rem; font-weight: 400; line-height: 1.22; margin-bottom: 5px;
    letter-spacing: 0.01em;
  }
  .playcard.mini .pc-name { font-size: 0.7rem; }
  .playcard.treasure .pc-name { color: var(--blood-dark); }
  .playcard.battle .pc-name { color: #f0c8a0; }
  .playcard.special .pc-name { color: #cabaf0; }

  .pc-foot { font-size: 0.66rem; line-height: 1.4; opacity: 0.85; border-top: 1px dashed currentColor; padding-top: 6px; margin-top: auto; }
  .playcard.mini .pc-foot { font-size: 0.58rem; }
  .pc-stats { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; font-family: 'Special Elite', monospace; }
  .pc-stats .a { color: #e89060; }
  .pc-stats .d { color: #90b8e8; }
  .pc-ingredient-tag { position: absolute; top: 8px; right: 8px; font-size: 1rem; }
  .pc-level {
    position: absolute; top: 8px; right: 8px; font-size: 0.62rem;
    background: #6a5a96; color: var(--bone); border: 1px solid #8a7ab8;
    border-radius: 50%; width: 18px; height: 18px;
    display:flex; align-items:center; justify-content:center; font-weight:700;
  }

  .hand-zone { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 0.5rem; }
  .card-slot { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .card-slot .card-action-btn { font-size: 0.72rem; padding: 6px 9px; width: 100%; }

  button {
    font-family: 'IM Fell English SC', serif; font-size: 0.85rem; padding: 8px 12px;
    border-radius: 3px; border: 1px solid var(--gold-dark);
    background: linear-gradient(160deg, var(--night-light), var(--night));
    color: var(--paper); cursor: pointer; transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  button:hover:not(:disabled) { background: linear-gradient(160deg, #5a4a32, var(--night-light)); border-color: var(--gold); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  button.primary { border-color: var(--flame); background: linear-gradient(160deg, var(--flame-dark), #5a2410); color: #ffd8b0; }
  button.primary:hover:not(:disabled) { background: linear-gradient(160deg, var(--flame), var(--flame-dark)); }
  button.danger { border-color: var(--blood); color: #f0a8a0; }

  .battle-box {
    border: 1px solid var(--blood); border-left: 4px solid var(--blood);
    background: linear-gradient(160deg, #3a1410, #240c0a);
    border-radius: 4px; padding: 16px; margin-bottom: 1rem;
    max-height: calc(100vh - 2rem); overflow-y: auto;
  }
  .battle-box p { margin: 0 0 10px; font-size: 0.9rem; color: #f0d8c8; font-family: 'IM Fell English SC', serif; }
  .target-list { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
  .target-list .mini-wrap { cursor: pointer; border-radius: 8px; padding: 3px; border: 2px solid transparent; }
  .target-list .mini-wrap.selected { border-color: var(--flame-light); box-shadow: 0 0 10px rgba(232,118,46,0.4); }

  @keyframes revealPop { from { transform: scale(0.7) rotate(-4deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
  .reveal-box {
    border: 2px solid var(--gold); background: linear-gradient(160deg, #2a2010, #181208);
    border-radius: 8px; padding: 16px; margin-bottom: 1.25rem; text-align: center;
    max-height: calc(100vh - 2rem); overflow-y: auto;
  }
  .reveal-title {
    font-family: 'Pirata One', cursive; font-size: 1.25rem; margin: 0 0 2px;
    color: var(--flame-light); text-shadow: 1px 1px 0 var(--char);
  }
  .reveal-target { font-family: 'IM Fell English SC', serif; font-size: 0.85rem; color: var(--paper-darker); margin-bottom: 10px; }
  .reveal-vs-row { display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
  .reveal-side { display: flex; flex-direction: column; align-items: center; gap: 5px; animation: revealPop 0.45s ease-out; }
  .reveal-who { font-family: 'IM Fell English SC', serif; font-size: 0.75rem; color: var(--paper-darker); }
  .reveal-value {
    font-family: 'Special Elite', monospace; font-size: 1.05rem; font-weight: 700;
    padding: 3px 12px; border-radius: 6px; border: 2px solid;
  }
  .reveal-side.winner .reveal-value { background: linear-gradient(160deg, #2a4818, #1a3010); border-color: var(--sickly); color: #c8e090; }
  .reveal-side.loser .reveal-value { background: linear-gradient(160deg, #4a1c14, #2e0f0a); border-color: var(--blood); color: #e89890; opacity: 0.75; }
  .reveal-side.winner .playcard { box-shadow: 0 0 0 3px var(--sickly), 2px 3px 0 rgba(0,0,0,0.35); }
  .reveal-vs-label { font-family: 'Pirata One', cursive; font-size: 1.3rem; color: var(--gold); align-self: center; }
  .reveal-crown { font-size: 1.1rem; margin-bottom: -2px; }
  .reveal-target-card { margin: 6px auto 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .reveal-target-label { font-family: 'IM Fell English SC', serif; font-size: 0.75rem; color: var(--paper-darker); }
  .reveal-arrow { font-size: 1.1rem; color: var(--gold); margin: 0 6px; }
  .reveal-text { font-size: 0.78rem; color: #e8d8c0; max-width: 480px; margin: 0 auto 12px; line-height: 1.4; }
  .reveal-box .playcard.mini { width: 112px; min-height: 148px; padding: 7px 6px; }
  .reveal-box .pc-foot { display: none; }
  .reveal-box .pc-category { font-size: 0.5rem; }
  .reveal-box .pc-name { font-size: 0.6rem; }

  .log { border-top: 1px solid var(--gold-dark); padding-top: 12px; margin-top: 1.25rem; }
  .log p { font-size: 0.82rem; color: var(--paper-darker); margin: 0 0 6px; font-family: 'Special Elite', monospace; }
  .log p.you { color: #a8d4a0; }
  .log p.opp { color: #e89898; }
  .log p.system { color: #90c4e0; font-style: italic; }

  .actions-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.1rem; align-items: center; }
  .game-over {
    text-align: center; padding: 2.5rem 1.5rem;
    background: linear-gradient(165deg, var(--night-light), var(--night));
    border-radius: 8px; border: 2px solid var(--gold-dark);
  }
  .game-over h2 { font-family: 'Pirata One', cursive; font-weight: 400; margin: 0.5rem 0; font-size: 1.8rem; }
  .game-over.win h2 { color: #a8d4a0; text-shadow: 2px 2px 0 var(--char); }
  .game-over.lose h2 { color: #e89898; text-shadow: 2px 2px 0 var(--char); }

  .rules-recap {
    font-size: 0.8rem; color: var(--paper-darker);
    background: linear-gradient(160deg, var(--night-light), var(--night));
    border: 1px solid var(--gold-dark); border-radius: 4px; padding: 12px 14px; margin-bottom: 1.25rem;
    font-family: 'Special Elite', monospace; line-height: 1.6;
  }
  .rules-recap strong { color: var(--gold); font-family: 'IM Fell English SC', serif; }

  .strategy-box {
    background: linear-gradient(160deg, #2a3018, #1a2010);
    border: 1px solid var(--sickly); border-left: 4px solid var(--sickly);
    border-radius: 4px; padding: 14px 16px; margin-bottom: 1.25rem;
  }
  .strategy-box .strategy-title {
    font-family: 'IM Fell English SC', serif; font-weight: 400;
    color: #c8d890; margin-bottom: 8px; font-size: 0.95rem;
    text-transform: uppercase; letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 8px;
  }
  .strategy-box ul { margin: 0; padding-left: 1.2rem; }
  .strategy-box li { font-size: 0.85rem; color: #d8e0b8; margin-bottom: 6px; line-height: 1.5; }
  .strategy-box li:last-child { margin-bottom: 0; }
  .strategy-box li b { color: #e8f0c8; }
  .strategy-box .hand-state { font-size: 0.76rem; color: #a8b888; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--sickly-dark); font-family: 'Special Elite', monospace; }

  details.cardex {
    background: linear-gradient(160deg, var(--night-light), var(--night));
    border: 1px solid var(--gold-dark); border-radius: 4px;
    padding: 12px 14px; margin-bottom: 1.25rem; font-size: 0.8rem;
  }
  details.cardex summary { cursor: pointer; color: var(--gold); font-family: 'IM Fell English SC', serif; font-size: 0.95rem; letter-spacing: 0.02em; }
  .cardex-grid { margin-top: 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 8px 16px; }
  .cardex-grid .ce { color: var(--paper-darker); font-family: 'Special Elite', monospace; font-size: 0.74rem; line-height: 1.5; }
  .cardex-grid .ce b { color: var(--paper); font-family: 'IM Fell English SC', serif; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>La Fallera Calavera</h1>
  <p class="subtitle">Entraînement guidé contre une IA bienveillante — réunis 5 ingrédients pour cuisiner la paella</p>
  <div class="game-layout">
    <div id="app" class="game-main"></div>
    <div class="log-sidebar">
      <div class="ai-level-bar">
        <div class="ctrl-row">
          <label class="ai-level-label" for="lang-select" id="lang-label-el">Langue :</label>
          <select id="lang-select" class="ai-lvl-btn" onchange="setLang(this.value)">
            <option value="fr">🇫🇷 Français</option>
            <option value="es">🇪🇸 Español</option>
            <option value="val">🏳️ Valencià</option>
          </select>
        </div>
        <div class="ctrl-row">
          <span class="ai-level-label" id="level-label-el">Niveau IA :</span>
          <select id="level-select" class="ai-lvl-btn" onchange="setAiLevel(this.value)">
            <option value="debutante" id="opt-debutante">Débutante</option>

/* ============== UTILITAIRES ============== */
function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function weightedDrawPool() {
  // Reconstruit un pool pondéré selon les vraies quantités (27/33/40 sur 100)
  const pool = [];
  TREASURES.forEach(c => { for (let i = 0; i < c.qty; i++) pool.push({ type: "treasure", ...c }); });
  BATTLE_CARDS.forEach(c => { for (let i = 0; i < c.qty; i++) pool.push({ type: "battle", ...c }); });
  SPECIAL_CARDS.forEach(c => { for (let i = 0; i < c.qty; i++) pool.push({ type: "special", ...c }); });
  return pool;
}
const DECK_POOL = weightedDrawPool();

function drawRandomCard() { return { ...rnd(DECK_POOL) }; }

// Toute carte piochée passe par cette fonction : si c'est un trésor, il va
// AUTOMATIQUEMENT au mostrador (ce n'est pas un choix, c'est la vraie règle),
// sinon il rejoint la main du joueur. Retourne la carte pour le message de log.
function drawCardFor(who) {
  const card = drawRandomCard();
  if (card.type === "treasure") {
    if (who === "me") state.myCounter.push(card);
    else state.oppCounter.push(card);
  } else {
    if (who === "me") state.myHand.push(card);
    else state.oppHand.push(card);
  }
  return card;
}

function countIngredients(counter) { return counter.filter(c => c.ingredient).length; }
function skullEmoji(type) { return type === "treasure" ? "💀" : type === "battle" ? "⚔" : "✨"; }
function cardDesc(c) { return c[lang] || c["fr"] || ""; }
function hasBoost(counter, tag) { return counter.some(c => c.effectTag === tag); }
function sendToCemetery(card) { if (state.cemetery) state.cemetery.push(card); }

/* ============== ÉCRAN DE RÉVÉLATION DE BATAILLE ============== */
// Affiche les deux cartes engagées face à face (façon "carte vs carte") avant
// de continuer le flux du jeu, pour que le résultat d'un combat soit visible
// à l'écran et pas seulement lu dans le journal texte.
function showBattleReveal(data) {
  state.battleReveal = data;
  state.previousPhase = state.phase;
  state.phase = "battleReveal";
  render();
}

function continueAfterReveal() {
  const after = state.battleReveal ? state.battleReveal.after : null;
  state.battleReveal = null;
  if (after) after();
}

/* ============== EL JUGADOR DE PETRER : CHOIX DE DÉFAUSSE ============== */
// "Défausse JUSQU'À 5 cartes de ta main" — un vrai choix, pas un tirage au
// hasard à la place du joueur.
function toggleMulliganCard(idx) {
  const sel = state.pendingMulligan.selected;
  const pos = sel.indexOf(idx);
  if (pos !== -1) {
    sel.splice(pos, 1);
  } else if (sel.length < 5) {
    sel.push(idx);
  }
  render();
}

function confirmMulligan() {
  const sel = state.pendingMulligan.selected.slice().sort((a, b) => b - a); // décroissant pour splice sans décalage
  const discarded = sel.map(i => state.myHand[i].n);
  sel.forEach(i => { sendToCemetery(state.myHand[i]); state.myHand.splice(i, 1); });
  const n = sel.length;
  for (let i = 0; i < n; i++) drawCardFor("me");

  if (n === 0) {
    logMsg(`"El jugador de Petrer" : tu choisis de ne défausser aucune carte (0 carte piochée).`, "you");
    setGuide("Aucune défausse", `Tu n'as sélectionné aucune carte — c'est valide ("jusqu'à 5"), mais tu ne piochés rien non plus dans ce cas.`);
  } else {
    logMsg(`"El jugador de Petrer" : tu défausses ${n} carte(s) choisie(s) (${discarded.join(", ")}) et en piochés autant.`, "you");
    setGuide("Renouvellement de main", `Tu as choisi toi-même quelles cartes remplacer. Les éventuels trésors piochés iront directement sur ton mostrador.`);
  }

  state.pendingMulligan = null;
  checkWin();
  if (!state.gameOver) endPlayerTurn();
  render();
}

/* ============== CASSALLA MIRACULOSA : CHOIX DANS LE CIMETIÈRE ============== */
// "Récupère une carte" est un vrai choix éclairé — on affiche tout le
// cimetière avec le rôle de chaque carte pour que tu décides en connaissance.
function chooseCassallaCard(cemeteryIdx) {
  const recovered = state.cemetery[cemeteryIdx];
  state.cemetery.splice(cemeteryIdx, 1);

  if (recovered.type === "treasure") {
    state.myCounter.push(recovered);
    logMsg(`"Cassalla miraculosa" : tu récupères "${recovered.n}" depuis le cimetière — c'est un trésor, il part directement sur ton mostrador.`, "you");
    setGuide("Résurrection", `"${recovered.n}" rejoint ton mostrador, visible de l'adversaire comme tout trésor.`);
  } else {
    state.myHand.push(recovered);
    logMsg(`"Cassalla miraculosa" : tu récupères "${recovered.n}" depuis le cimetière, elle rejoint ta main.`, "you");
    setGuide("Résurrection", `"${recovered.n}" est de retour dans ta main, prête à être rejouée.`);
  }

  state.pendingCassalla = null;
  checkWin();
  if (!state.gameOver) endPlayerTurn();
  render();
}

/* ============== DONYET ESCODRINYADOR : CHOIX PARMI 10 CARTES PIOCHÉES ============== */
function chooseDigCard(poolIdx) {
  const kept = state.pendingDig.pool[poolIdx];

  if (kept.type === "treasure") {
    state.myCounter.push(kept);
    logMsg(`"Donyet escodrinyador" : tu gardes "${kept.n}" parmi les 10 — c'est un trésor, il part sur ton mostrador.`, "you");
    setGuide("Fouille réussie", `"${kept.n}" rejoint ton mostrador. Les 9 autres cartes sont remélangées dans la pioche.`);
  } else {
    state.myHand.push(kept);
    logMsg(`"Donyet escodrinyador" : tu gardes "${kept.n}" parmi les 10, elle rejoint ta main.`, "you");
    setGuide("Fouille réussie", `"${kept.n}" est en main. Les 9 autres cartes sont remélangées dans la pioche.`);
  }

  state.pendingDig = null;
  checkWin();
  if (!state.gameOver) endPlayerTurn();
  render();
}

function t(key, vars) {
  const trs = TRANSLATIONS[key];
  if (!trs) return key;
  let str = trs[lang] || trs["fr"] || key;
  if (vars) Object.entries(vars).forEach(([k,v]) => { str = str.replaceAll("{"+k+"}", v); });
  return str;
}
