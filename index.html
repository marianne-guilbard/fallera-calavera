function dealInitialHand() {
  const hand = [];
  for (let i = 0; i < 7; i++) hand.push(drawRandomCard());
  return hand;
}

function newGame() {
  // Règle officielle : si un joueur démarre avec 3 ingrédients ou plus, on redistribue tout.
  // Pour vérifier cette règle on doit quand même compter les trésors de la donne brute,
  // mais on ne les sépare PAS automatiquement : le joueur les posera lui-même à l'étape de mise en place.
  let myRaw, oppRaw;
  let attempts = 0;
  const countIngInRaw = (raw) => raw.filter(c => c.type === "treasure" && c.ingredient).length;
  do {
    myRaw = dealInitialHand();
    oppRaw = dealInitialHand();
    attempts++;
  } while (attempts < 20 && (countIngInRaw(myRaw) >= 3 || countIngInRaw(oppRaw) >= 3));

  // L'adversaire (IA) pose ses propres trésors de mise en place automatiquement —
  // ça reste pédagogique de le voir faire, mais c'est SA main, pas la tienne.
  const oppHand = [], oppCounter = [];
  oppRaw.forEach(c => { if (c.type === "treasure") oppCounter.push(c); else oppHand.push(c); });

  // Ta main à toi reste BRUTE : tu vas devoir trier toi-même quels trésors poser.
  const mySetupTreasureIdxs = [];
  myRaw.forEach((c, i) => { if (c.type === "treasure") mySetupTreasureIdxs.push(i); });

  state = {
    turn: 1,
    phase: mySetupTreasureIdxs.length > 0 ? "setup" : "player",
    myHand: myRaw, oppHand,
    myCounter: [], oppCounter,
    cemetery: [], // cartes défaussées/utilisées (bataille, spéciales, trésors vendus) — partagé entre les deux joueurs
    setupTreasureQueue: mySetupTreasureIdxs, // indices dans myHand restant à poser
    log: oppCounter.length > 0
      ? [{ text: `Mise en place : la donne de l'adversaire contenait ${oppCounter.length} trésor(s) (${oppCounter.map(c=>c.n).join(", ")}), posé(s) automatiquement sur son mostrador.`, cls: "system" }]
      : [{ text: `Mise en place : la donne de l'adversaire ne contenait aucun trésor.`, cls: "system" }],
    pendingBattle: null,
    pendingDefense: null,
    pendingOppSpecial: null,
    pendingMulligan: null,
    pendingCassalla: null,
    pendingDig: null,
    gameOver: null,
    guideMsg: mySetupTreasureIdxs.length > 0
      ? {
          title: "Mise en place — c'est à toi de jouer",
          text: `Voici tes 7 cartes de départ. Parmi elles, ${mySetupTreasureIdxs.length} sont des trésors (calavera jaune) — la règle dit qu'ils doivent OBLIGATOIREMENT être posés, visibles, sur ton mostrador avant que la partie ne commence. Clique sur le bouton "Poser sur le mostrador" de chaque trésor en bas, un par un. Ce n'est pas automatique : c'est toi qui dois le faire, pour bien intégrer cette règle.`
        }
      : {
          title: "Mise en place",
          text: "Voici tes 7 cartes de départ. Bonne nouvelle (ou pas) : aucune n'est un trésor, donc rien à poser pour l'instant. La partie peut commencer directement — c'est ton tour !"
        }
  };
  render();
}

function setGuide(title, text) { state.guideMsg = { title, text }; }
function logMsg(text, cls) { state.log.push({ text, cls }); }

function checkWin() {
  if (countIngredients(state.myCounter) >= 5) { state.gameOver = "win"; state.phase = "over"; }
  else if (countIngredients(state.oppCounter) >= 5) { state.gameOver = "lose"; state.phase = "over"; }
}

/* ============== ANALYSE STRATÉGIQUE ============== */
function buildStrategyTips() {
  const tips = [];
  const handSize = state.myHand.length;
  const myIng = countIngredients(state.myCounter);
  const oppIng = countIngredients(state.oppCounter);
  const battleInHand = state.myHand.filter(c => c.type === "battle").length;
  const sellableOnCounter = state.myCounter.filter(c => c.sell).length;
  const stealableTargets = state.oppCounter.length;

  // Etat de la main : alerte si elle se vide (la main ne contient que bataille/spéciales,
  // les trésors étant désormais toujours sur le mostrador)
  if (handSize === 0) {
    tips.push(`<b>Main vide !</b> Tu n'as plus aucune carte de bataille ni spéciale. La seule option qui te reste est <b>almoina</b> (ou vendre un trésor si tu en as un vendable sur ton mostrador).`);
  } else if (handSize <= 2) {
    tips.push(`<b>Main presque vide (${handSize} carte${handSize>1?'s':''})</b> : pense sérieusement à faire almoina bientôt, sinon tu n'auras bientôt plus aucune option de jeu.`);
  } else if (handSize >= 8) {
    tips.push(`<b>Main bien fournie (${handSize} cartes)</b> : c'est le bon moment pour jouer activement (attaquer, jouer une spéciale) plutôt que de piocher encore.`);
  }

  // Ingrédients déjà sur le mostrador = rappel de progression
  if (myIng > 0) {
    tips.push(`Tu as déjà <b>${myIng}/5 ingrédient${myIng>1?'s':''}</b> sur ton mostrador (posés automatiquement dès que tu les as piochés ou volés). Plus que ${5-myIng} pour gagner !`);
  }

  // Cible de vol intéressante
  if (stealableTargets > 0 && battleInHand > 0) {
    const oppIngVisible = state.oppCounter.filter(c => c.ingredient).length;
    if (oppIngVisible > 0) {
      tips.push(`L'adversaire a <b>${oppIngVisible} ingrédient${oppIngVisible>1?'s':''} visible${oppIngVisible>1?'s':''}</b> sur son mostrador : une bataille réussie te ferait gagner du terrain ET le ferait reculer. Vise en priorité ces cartes-là plutôt qu'un trésor sans intérêt.`);
    } else {
      tips.push(`L'adversaire a des trésors visibles mais aucun ingrédient parmi eux : une bataille reste possible pour le gêner, mais ce n'est pas la priorité absolue.`);
    }
  } else if (battleInHand > 0 && stealableTargets === 0) {
    tips.push(`Tu as <b>${battleInHand} carte${battleInHand>1?'s':''} de bataille</b> en main mais l'adversaire n'a encore rien sur son mostrador : garde-les, elles te serviront dès qu'il piochera un trésor (ça lui arrivera automatiquement, il ne peut pas l'éviter).`);
  }

  // Vente de trésor comme alternative à almoina
  if (sellableOnCounter > 0) {
    tips.push(`Tu as <b>${sellableOnCounter} trésor${sellableOnCounter>1?'s':''} "de vente"</b> déjà sur ton mostrador (marqué ★ dans sa description) : le vendre te donne des cartes fraîches <b>sans consommer un tour d'almoina pur</b> — souvent plus rentable si ce trésor ne te sert à rien d'autre. Attention : il reste vulnérable au vol tant que tu ne l'as pas vendu.`);
  }

  // Si la main est faible en options
  if (battleInHand === 0 && state.myHand.filter(c => c.type === "special").length === 0) {
    tips.push(`Ta main ne contient ni carte de bataille ni carte spéciale utilisable : c'est typiquement le moment de faire <b>almoina</b> pour te renouveler${sellableOnCounter > 0 ? ", ou de vendre un trésor si tu en as un sur ton mostrador" : ""}.`);
  }

  // Avertissement si on est très en retard
  if (oppIng >= 3 && myIng < oppIng) {
    tips.push(`L'adversaire a <b>${oppIng}/5 ingrédients</b>, il se rapproche de la victoire. Si tu as une carte de bataille, envisage une attaque ciblée sur un de ses ingrédients plutôt que de jouer prudent.`);
  }

  if (tips.length === 0) {
    tips.push(`Pas de conseil tranché ce tour-ci : plusieurs options se valent. Pense à l'équilibre entre "jouer une carte utile maintenant" et "garder assez de cartes en main pour plus tard".`);
  }

  return tips;
}

/* ============== MISE EN PLACE (phase setup) ============== */
// Pendant cette phase, le joueur pose lui-même, un par un, les trésors reçus
// dans sa donne de départ. Ce n'est pas une "action de tour" classique (pas de
// limite à 1 par tour ici, c'est une obligation de règle, pas un choix tactique),
// mais on la fait cliquer explicitement pour que le joueur l'intègre bien.
function placeSetupTreasure(idx) {
  const card = state.myHand[idx];
  if (!card || card.type !== "treasure") return;
  state.myCounter.push(card);
  state.myHand.splice(idx, 1);
  // Met à jour la file d'attente des indices restants (les indices après idx décalent de 1)
  state.setupTreasureQueue = state.myHand
    .map((c, i) => (c.type === "treasure" ? i : null))
    .filter(i => i !== null);

  logMsg(`Mise en place : tu poses "${card.n}" sur ton mostrador (obligatoire, ${card.ingredient ? "c'est un ingrédient !" : "effet : " + card.fr}).`, "you");

  if (state.setupTreasureQueue.length > 0) {
    setGuide("Mise en place — continue", `Encore ${state.setupTreasureQueue.length} trésor(s) à poser avant de pouvoir commencer ton premier vrai tour.`);
  } else {
    state.phase = "player";
    setGuide("Mise en place terminée — à toi de jouer !", `Tous tes trésors de départ sont posés. Maintenant la vraie partie commence : choisis UNE action (vendre un trésor vendable si tu en as, attaquer, jouer une spéciale, ou almoina).`);
    checkWin();
  }
  render();
}

/* ============== ACTIONS JOUEUR ============== */
// NB : une fois la mise en place terminée, poser un trésor n'est PLUS une action
// du joueur — c'est automatique et obligatoire dès qu'un trésor est pioché ou
// volé (voir drawCardFor). La seule chose que le joueur peut décider plus tard,
// c'est de VENDRE un trésor de vente déjà présent sur son mostrador (action
// sellTreasureFromCounter ci-dessous).

function sellTreasureFromCounter(idx) {
  const card = state.myCounter[idx];
  if (!card.sell) return;

  // Cas spécial Sant Calze de la Catedral : nombre de cartes piochées variable,
  // calculé au moment de la vente (7 moins le nombre de trésors au mostrador,
  // lui-même inclus dans le compte).
  let amount = card.sell;
  if (card.effectTag === "santcalze") {
    amount = Math.max(0, 7 - state.myCounter.length);
  }

  state.myCounter.splice(idx, 1);
  sendToCemetery(card);
  for (let i = 0; i < amount; i++) drawCardFor("me");

  if (card.effectTag === "dolçaina") {
    logMsg(`Tu vends "${card.n}" contre ${amount} nouvelle(s) carte(s), et tu rejoues immédiatement une action en plus !`, "you");
    setGuide("Dolçaina i tabalet — rejoue !", `"${card.n}" part au cimetière, tu piochés ${amount} carte(s), et contrairement aux trésors de vente classiques, ton tour N'EST PAS terminé : choisis tout de suite une nouvelle action.`);
    checkWin();
    render(); // ne termine pas le tour : pas d'appel à endPlayerTurn()
    return;
  }

  logMsg(`Tu vends "${card.n}" (déjà sur ton mostrador) contre ${amount} nouvelle(s) carte(s).`, "you");
  setGuide("Trésor vendu", `"${card.n}" part au cimetière, et tu piochés ${amount} carte(s) en échange (si l'une d'elles est un trésor, il ira automatiquement sur ton mostrador). C'est une des façons d'obtenir des cartes fraîches sans faire almoina — mais ça reste ton action complète du tour.`);
  checkWin();
  if (!state.gameOver) endPlayerTurn();
  render();
}

function startBattle(idx) {
  if (state.oppCounter.length === 0) {
    setGuide("Pas de cible", "L'adversaire n'a encore aucun trésor visible sur son mostrador. Choisis une autre action en attendant.");
    render();
    return;
  }
  state.pendingBattle = { cardIdx: idx, targetIdx: 0 };
  state.phase = "battleChoice";
  const card = state.myHand[idx];
  let note = "";
  if (card.effectTag === "team") {
    note = ` Note d'entraînement : dans le vrai jeu, les Monleonetes ne peuvent pas combattre seules — elles se posent à côté d'une autre carte de bataille pour lui donner +1 ATT. Cette version simplifiée ne gère pas encore les combinaisons de deux cartes, donc ici elle combat seule avec ses points de base.`;
  } else if (card.effectTag === "monleonLeader") {
    note = ` Note d'entraînement : son bonus "leadership" (+1 ATT si accompagné de Monleonetes) nécessite une combinaison de cartes que cette version simplifiée ne simule pas encore — elle combat ici avec ses points de base (ATT ${card.a}).`;
  }
  setGuide("Choisis ta cible", `Tu attaques avec "${card.n}" (ATT ${card.a ?? "?"}), posée face cachée. Choisis le trésor adverse que tu vises, puis confirme. L'adversaire pourra choisir de se défendre avec une carte de bataille, ou de ne pas se défendre du tout (l'attaquant gagne alors automatiquement).${note}`);
  render();
}

function confirmBattle() {
  const { cardIdx, targetIdx } = state.pendingBattle;
  // On ne résout plus tout de suite : on passe par une étape de préparation où
  // l'attaquant peut engager une carte spéciale de combat (Masclet, Espill lluent,
  // Aigua de València) avant la révélation finale — exactement comme le prévoit
  // la vraie règle ("au moment où tu déclares une bataille" / "avant révélation").
  state.pendingBattle.prep = { atkBonus: 0, atkMalus: 0, defMalus: 0 };
  state.phase = "battlePrep";
  const myCard = state.myHand[cardIdx];
  const target = state.oppCounter[targetIdx];
  setGuide("Préparation de la bataille", `Carte posée face cachée : "${myCard.n}" (ATT ${myCard.a ?? "?"}) contre "${target.n}". Avant la révélation, tu peux engager une carte spéciale de combat si tu en as une en main (Masclet, Espill lluent, Aigua de València), ou lancer directement la résolution.`);
  render();
}

function playBattlePrepSpecial(handIdx) {
  const card = state.myHand[handIdx];
  if (!["masclet", "espill", "aigua"].includes(card.effect)) return;

  if (card.effect === "masclet") {
    const n = Math.min(2, state.oppHand.length);
    const lost = [];
    for (let i = 0; i < n; i++) {
      const r = Math.floor(Math.random() * state.oppHand.length);
      lost.push(state.oppHand[r].n);
      sendToCemetery(state.oppHand[r]);
      state.oppHand.splice(r, 1);
    }
    state.myHand.splice(handIdx, 1);
    sendToCemetery(card);
    logMsg(`"${card.n}" engagée : l'adversaire perd ${n} carte(s) au hasard de sa main avant la bataille (${lost.join(", ") || "rien à perdre"}).`, "you");
    setGuide("Masclet engagé", `Tu as affaibli la main de l'adversaire juste avant la résolution. Tu peux maintenant lancer la bataille.`);
  } else if (card.effect === "espill") {
    const myAtkCard = state.myHand[state.pendingBattle.cardIdx];
    const oldA = myAtkCard.a, oldD = myAtkCard.d;
    myAtkCard.a = oldD; myAtkCard.d = oldA;
    state.myHand.splice(handIdx, 1);
    sendToCemetery(card);
    logMsg(`"${card.n}" engagée sur ta carte d'attaque "${myAtkCard.n}" : ATT et DEF sont inversés (ATT ${myAtkCard.a} désormais).`, "you");
    setGuide("Espill lluent engagé", `Les valeurs ATT/DEF de ta carte de bataille viennent d'être inversées pour cette bataille.`);
  } else if (card.effect === "aigua") {
    state.pendingBattle.prep.defMalus += 1;
    state.myHand.splice(handIdx, 1);
    sendToCemetery(card);
    logMsg(`"${card.n}" engagée : la défense adverse sera réduite de 1 point lors de la révélation. (Pas cumulable, donc inutile d'en jouer une deuxième.)`, "you");
    setGuide("Aigua de València engagée", `La carte de défense adverse perdra 1 point au moment de la révélation.`);
  }
  render();
}

function launchBattleResolution() {
  const { cardIdx, targetIdx, prep } = state.pendingBattle;
  const defMalus = prep ? prep.defMalus : 0;
  const myCard = state.myHand[cardIdx];
  const target = state.oppCounter[targetIdx];

  const defendCandidates = state.oppHand.filter(c => c.type === "battle");
  const willDefend = defendCandidates.length > 0 && Math.random() < 0.75;

  state.myHand.splice(cardIdx, 1);

  let myAtt = (myCard.a ?? 0) + (hasBoost(state.myCounter, "atkBoost") ? 1 : 0) + (hasBoost(state.myCounter, "sangonera") ? countIngredients(state.myCounter) : 0);

  if (!willDefend) {
    // La Moma n'a pas de valeur propre sans adversaire face à elle : on la
    // traite comme une carte faible (ATT 0) dans ce cas particulier.
    if (myCard.effectTag === "moma") myAtt = 0;
    state.myCounter.push(target);
    state.oppCounter.splice(targetIdx, 1);
    logMsg(`Tu attaques avec "${myCard.n}" (ATT ${myAtt}). L'adversaire ne se défend pas : tu remportes "${target.n}" automatiquement.`, "you");
    if (myCard.effectTag === "alcaldessa") { state.myHand.push(myCard); logMsg(`"Perpétuité" : "${myCard.n}" revient dans ta main.`, "you"); }
    else sendToCemetery(myCard);
    showBattleReveal({
      attacker: { card: myCard, value: myAtt, label: "ATT", who: "Toi" },
      defender: null,
      won: true,
      title: "Victoire sans combat",
      text: `Quand le défenseur ne présente aucune carte, l'attaquant gagne directement. C'est une vraie option stratégique : l'adversaire préfère parfois garder ses cartes de bataille en main plutôt que de les risquer pour un trésor mineur.`,
      target, targetWinner: "you",
      after: () => resolveBattleEnd()
    });
    return;
  } else {
    // L'IA choisit sa carte de défense selon son niveau : meilleure DEF pour
    // les niveaux normale/avancée/experte, carte aléatoire pour débutante.
    const ai2 = getAiParams();
    const defCandidates = state.oppHand.map((c, i) => ({ c, i })).filter(({ c }) => c.type === "battle");
    const chosen = ai2.bestDefense
      ? defCandidates.reduce((a, b) => ((a.c.d ?? 0) > (b.c.d ?? 0) ? a : b))
      : defCandidates[Math.floor(Math.random() * defCandidates.length)];
    const defCardIdx = chosen.i;
    const oppDefCard = state.oppHand[defCardIdx];

    let aiAigua = 0;
    const aiguaIdx = state.oppHand.findIndex(c => c.effect === "aigua");
    if (aiguaIdx !== -1 && Math.random() < ai2.pAigua) {
      const aiguaCard = state.oppHand[aiguaIdx];
      state.oppHand.splice(aiguaIdx, 1);
      sendToCemetery(aiguaCard);
      aiAigua = 1;
      logMsg(`L'adversaire engage "${aiguaCard.n}" en défense pour réduire ton attaque de 1 point.`, "opp");
    }

    let oppDef = (oppDefCard.d ?? 0) + (hasBoost(state.oppCounter, "defBoost") ? 1 : 0) + (hasBoost(state.oppCounter, "sangonera") ? countIngredients(state.oppCounter) : 0) - defMalus;
    myAtt -= aiAigua;

    // La Moma : "Justa virtud" — copie toujours exactement les points de la carte
    // adverse, donc l'égalité est garantie et le défenseur l'emporte systématiquement.
    if (myCard.effectTag === "moma") myAtt = oppDef;

    state.oppHand.splice(state.oppHand.indexOf(oppDefCard), 1);
    sendToCemetery(oppDefCard);

    const aiguaNote = defMalus > 0 ? ` (défense réduite de ${defMalus} grâce à Aigua de València)` : "";

    const won = myAtt > oppDef;
    let title, text;
    if (won) {
      state.myCounter.push(target);
      state.oppCounter.splice(targetIdx, 1);
      logMsg(`Bataille : "${myCard.n}" (ATT ${myAtt}) bat "${oppDefCard.n}" (DEF ${oppDef}${aiguaNote}). Tu voles "${target.n}" !`, "you");
      title = "Victoire en bataille";
      text = `Ton attaque (${myAtt}) était strictement supérieure à la défense adverse (${oppDef}) : "${target.n}" rejoint ton mostrador. Les deux cartes utilisées partent au cimetière.`;
      if (myCard.effectTag === "alcaldessa") { state.myHand.push(myCard); logMsg(`"Perpétuité" : "${myCard.n}" revient dans ta main.`, "you"); }
      else sendToCemetery(myCard);
      if (myCard.effectTag === "bonusSteal" && state.oppCounter.length > 0) {
        const i2 = Math.floor(Math.random() * state.oppCounter.length);
        const bonus = state.oppCounter[i2];
        state.myCounter.push(bonus);
        state.oppCounter.splice(i2, 1);
        logMsg(`Effet "Moco pegajoso" de "La Bellea del Moc" : tu voles aussi "${bonus.n}" en plus !`, "you");
        text += ` Bonus "Moco pegajoso" : tu voles aussi "${bonus.n}" en plus !`;
      }
    } else {
      sendToCemetery(myCard);
      const isEqual = myAtt === oppDef;
      logMsg(`Bataille perdue : "${myCard.n}" (ATT ${myAtt}) face à "${oppDefCard.n}" (DEF ${oppDef}${aiguaNote}).${isEqual ? " Rappel : à égalité, c'est le défenseur qui gagne." : ""}`, "you");
      if (myCard.effectTag === "moma") {
        title = "Bataille perdue (La Moma)";
        text = `"La Moma" copie toujours exactement les points de la carte adverse : l'égalité est donc automatique, et en cas d'égalité c'est toujours le défenseur qui gagne. C'est une carte d'attaque structurellement perdante.`;
      } else {
        title = "Bataille perdue";
        text = isEqual
          ? `Ton attaque (${myAtt}) était égale à la défense (${oppDef}) : à égalité, c'est le défenseur qui l'emporte. Les deux cartes utilisées partent au cimetière.`
          : `Ton attaque (${myAtt}) était inférieure à la défense (${oppDef}). Les deux cartes utilisées partent au cimetière, rien d'autre ne change.`;
      }
    }
    showBattleReveal({
      attacker: { card: myCard, value: myAtt, label: "ATT", who: "Toi" },
      defender: { card: oppDefCard, value: oppDef, label: "DEF", who: "Adversaire" },
      won,
      title, text,
      target, targetWinner: won ? "you" : "opp",
      after: () => resolveBattleEnd()
    });
  }
}

function resolveBattleEnd() {
  state.pendingBattle = null;
  state.phase = "player";
  checkWin();
  if (!state.gameOver) endPlayerTurn();
  render();
}

function cancelBattle() {
  // Cas limite : si Espill lluent a été engagé puis qu'on annule, la carte
  // d'attaque garde ses valeurs inversées (l'effet est déjà consommé et la
  // carte spéciale déjà au cimetière) — c'est cohérent avec la vraie règle :
  // une fois la carte spéciale jouée, son effet n'est pas annulable.
  state.pendingBattle = null;
  state.phase = "player";
  setGuide("Bataille annulée", "Pas de souci, choisis une autre action. Note : si tu avais déjà engagé une carte spéciale de combat, son effet reste appliqué — elle est déjà jouée et part au cimetière, peu importe l'issue.");
  render();
}

/* ============== DÉFENSE CONTRE UNE ATTAQUE ADVERSE ============== */
// Fenêtre de réaction quand l'IA t'attaque : tu choisis ta carte de défense
// (ou aucune), et tu peux engager Espionatge / Aigua de València / Espill
// lluent avant la révélation — exactement comme un vrai défenseur.

function playDefensePrepSpecial(handIdx) {
  const card = state.myHand[handIdx];
  if (!["aigua", "espill", "protect"].includes(card.effect)) return;

  if (card.effect === "aigua") {
    state.pendingDefense.defAtkMalus = (state.pendingDefense.defAtkMalus || 0) + 1;
    state.myHand.splice(handIdx, 1);
    sendToCemetery(card);
    logMsg(`"${card.n}" engagée en défense : l'attaque adverse sera réduite de 1 point lors de la révélation. (Pas cumulable.)`, "you");
    setGuide("Aigua de València engagée", `L'attaque de l'adversaire perdra 1 point au moment de la révélation.`);
  } else if (card.effect === "espill" && state.pendingDefense.chosenDefIdx != null) {
    const myDefCard = state.myHand[state.pendingDefense.chosenDefIdx];
    const oldA = myDefCard.a, oldD = myDefCard.d;
    myDefCard.a = oldD; myDefCard.d = oldA;
    state.myHand.splice(handIdx, 1);
    sendToCemetery(card);
    logMsg(`"${card.n}" engagée sur ta carte de défense "${myDefCard.n}" : ATT et DEF sont inversés (DEF ${myDefCard.d} désormais).`, "you");
    setGuide("Espill lluent engagé", `Les valeurs de ta carte de défense viennent d'être inversées pour cette bataille.`);
  } else if (card.effect === "espill") {
    setGuide("Choisis d'abord ta défense", `Sélectionne ta carte de défense avant d'engager Espill lluent dessus.`);
  } else if (card.effect === "protect") {
    logMsg(`"${card.n}" engagée : elle n'a d'effet que contre une carte SPÉCIALE adverse, pas contre une bataille classique. Ici l'adversaire t'attaque avec une carte de bataille, donc elle est jouée sans effet utile dans ce contexte précis (mais elle part quand même au cimetière, comme dans le vrai jeu une fois jouée).`, "you");
    state.myHand.splice(handIdx, 1);
    sendToCemetery(card);
    setGuide("Paella protectora — hors contexte", `Cette carte protège contre les cartes SPÉCIALES (vol, échange...), pas contre les batailles. Garde-la pour la bonne occasion : tu sauras qu'il faut la jouer quand le journal t'annoncera qu'une carte spéciale te cible.`);
  }
  render();
}

function chooseDefenseCard(handIdx) {
  state.pendingDefense.chosenDefIdx = handIdx;
  render();
}

function resolveDefense(noDefense) {
  const { attackerCard, targetIdx, defAtkMalus, chosenDefIdx } = state.pendingDefense;
  const target = state.myCounter[targetIdx];

  let oppAtt = (attackerCard.a ?? 0) + (hasBoost(state.oppCounter, "atkBoost") ? 1 : 0) + (hasBoost(state.oppCounter, "sangonera") ? countIngredients(state.oppCounter) : 0) - (defAtkMalus || 0);

  if (noDefense || chosenDefIdx == null) {
    state.oppCounter.push(target);
    state.myCounter.splice(targetIdx, 1);
    logMsg(`Tu choisis de ne pas te défendre. L'adversaire remporte "${target.n}" automatiquement.`, "you");
    showBattleReveal({
      attacker: { card: attackerCard, value: oppAtt, label: "ATT", who: "Adversaire" },
      defender: null,
      won: false,
      title: "Pas de défense",
      text: `Tu as préféré ne pas risquer de carte de bataille pour ce trésor. C'est parfois le bon choix si tes cartes de défense valent plus cher à garder.`,
      target, targetWinner: "opp",
      after: () => finishDefense()
    });
  } else {
    const myDefCard = state.myHand[chosenDefIdx];
    let myDef = (myDefCard.d ?? 0) + (hasBoost(state.myCounter, "defBoost") ? 1 : 0) + (hasBoost(state.myCounter, "sangonera") ? countIngredients(state.myCounter) : 0);
    if (myDefCard.effectTag === "moma") myDef = oppAtt; // La Moma copie toujours l'attaque adverse

    state.myHand.splice(chosenDefIdx, 1);
    sendToCemetery(myDefCard);

    const malusNote = defAtkMalus > 0 ? ` (attaque réduite de ${defAtkMalus} grâce à Aigua de València)` : "";
    const won = oppAtt > myDef; // won = l'attaquant gagne
    let title, text;
    if (won) {
      state.oppCounter.push(target);
      state.myCounter.splice(targetIdx, 1);
      logMsg(`Bataille : "${attackerCard.n}" (ATT ${oppAtt}${malusNote}) bat ta défense "${myDefCard.n}" (DEF ${myDef}). L'adversaire vole "${target.n}".`, "you");
      title = "Défense insuffisante";
      text = `L'attaque adverse (${oppAtt}) était supérieure à ta défense (${myDef}). Les deux cartes de bataille partent au cimetière, et tu perds "${target.n}".`;
    } else {
      const isEqual = oppAtt === myDef;
      logMsg(`Bataille : ta défense "${myDefCard.n}" (DEF ${myDef}) résiste à l'attaque "${attackerCard.n}" (ATT ${oppAtt}${malusNote}). Tu gardes "${target.n}" !`, "you");
      title = "Défense réussie !";
      text = isEqual
        ? `Ta défense (${myDef}) était égale à l'attaque adverse (${oppAtt}) : à égalité, c'est toujours le défenseur qui gagne. "${target.n}" reste sur ton mostrador.`
        : `Ta défense (${myDef}) était supérieure à l'attaque adverse (${oppAtt}). "${target.n}" reste sur ton mostrador.`;
    }
    showBattleReveal({
      attacker: { card: attackerCard, value: oppAtt, label: "ATT", who: "Adversaire" },
      defender: { card: myDefCard, value: myDef, label: "DEF", who: "Toi" },
      won,
      title, text,
      target, targetWinner: won ? "opp" : "you",
      after: () => finishDefense()
    });
  }
}

function finishDefense() {
  state.pendingDefense = null;
  checkWin();
  if (!state.gameOver) { state.turn++; state.phase = "player"; }
  render();
}

/* ============== RÉACTION À UNE CARTE SPÉCIALE OFFENSIVE DE L'IA ============== */
// Fenêtre où tu peux engager Paella protectora pour annuler une carte spéciale
// adverse qui te cible directement (vol, échange).

function usePaellaProtectora(handIdx) {
  const protectCard = state.myHand[handIdx];
  if (protectCard.effect !== "protect") return;
  const { card } = state.pendingOppSpecial;

  state.myHand.splice(handIdx, 1);
  sendToCemetery(protectCard);
  sendToCemetery(card);

  logMsg(`"${protectCard.n}" engagée : tu annules l'effet de "${card.n}" (niveau ${card.level} contre niveau ${protectCard.level}). Rien ne se passe, l'attaque adverse est neutralisée !`, "you");
  setGuide("Annulé !", `"${protectCard.n}" a bloqué "${card.n}" avant qu'elle ne fasse effet. Ton mostrador reste intact.`);

  state.pendingOppSpecial = null;
  checkWin();
  if (!state.gameOver) { state.turn++; state.phase = "player"; }
  render();
}

function letOppSpecialResolve() {
  const { card } = state.pendingOppSpecial;
  sendToCemetery(card);

  if (card.effect === "steal" && state.myCounter.length > 0) {
    const i = Math.floor(Math.random() * state.myCounter.length);
    const stolen = state.myCounter[i];
    state.oppCounter.push(stolen);
    state.myCounter.splice(i, 1);
    logMsg(`"${card.n}" fait effet : l'adversaire te vole "${stolen.n}" sans bataille.`, "opp");
    setGuide("Effet subi", `Tu n'as pas (ou plus) de Paella protectora pour bloquer : "${stolen.n}" rejoint le mostrador adverse.`);
  } else if (card.effect === "swap" && state.myCounter.length > 0 && state.oppCounter.length > 0) {
    const myI = Math.floor(Math.random() * state.myCounter.length);
    const oppI = Math.floor(Math.random() * state.oppCounter.length);
    const mine = state.myCounter[myI], theirs = state.oppCounter[oppI];
    state.myCounter[myI] = theirs; state.oppCounter[oppI] = mine;
    logMsg(`"${card.n}" fait effet : l'adversaire échange son trésor "${theirs.n}" contre ton "${mine.n}".`, "opp");
    setGuide("Effet subi", `Échange forcé effectué — c'est désormais sur ton mostrador.`);
  }

  state.pendingOppSpecial = null;
  checkWin();
  if (!state.gameOver) { state.turn++; state.phase = "player"; }
  render();
}

function playSpecial(idx) {
  const card = state.myHand[idx];
  state.myHand.splice(idx, 1);
  sendToCemetery(card);

  if (card.effect === "steal" && state.oppCounter.length > 0) {
    // L'IA peut réagir avec sa propre Paella protectora, exactement comme toi
    // tu peux le faire contre ses attaques — symétrie complète des règles.
    const oppProtectIdx = state.oppHand.findIndex(c => c.effect === "protect");
    if (oppProtectIdx !== -1 && Math.random() < 0.6) {
      const protectCard = state.oppHand[oppProtectIdx];
      state.oppHand.splice(oppProtectIdx, 1);
      sendToCemetery(protectCard);
      logMsg(`L'adversaire engage "${protectCard.n}" : il annule l'effet de "${card.n}" avant qu'il ne fasse effet !`, "opp");
      setGuide("Bloqué par l'adversaire", `L'adversaire avait "Paella protectora" en main et l'a utilisée pour se protéger. Ton effet est annulé.`);
    } else {
      const i = Math.floor(Math.random() * state.oppCounter.length);
      const stolen = state.oppCounter[i];
      state.myCounter.push(stolen);
      state.oppCounter.splice(i, 1);
      logMsg(`"${card.n}" (niveau ${card.level}) : vol direct de "${stolen.n}", sans bataille.`, "you");
      setGuide("Carte spéciale jouée", `"${card.n}" agit immédiatement. Les cartes spéciales ont un niveau (ici ${card.level}) : en cas de conflit avec une autre carte spéciale, celle de niveau supérieur l'emporte.`);
    }
  } else if (card.effect === "swap" && state.oppCounter.length > 0 && state.myCounter.length > 0) {
    const oppProtectIdx2 = state.oppHand.findIndex(c => c.effect === "protect");
    if (oppProtectIdx2 !== -1 && Math.random() < 0.6) {
      const protectCard = state.oppHand[oppProtectIdx2];
      state.oppHand.splice(oppProtectIdx2, 1);
      sendToCemetery(protectCard);
      logMsg(`L'adversaire engage "${protectCard.n}" : il annule l'effet de "${card.n}" avant qu'il ne fasse effet !`, "opp");
      setGuide("Bloqué par l'adversaire", `L'adversaire avait "Paella protectora" en main et l'a utilisée pour se protéger. Ton échange est annulé.`);
      checkWin();
      if (!state.gameOver) endPlayerTurn();
      render();
      return;
    }
    const myI = Math.floor(Math.random() * state.myCounter.length);
    const oppI = Math.floor(Math.random() * state.oppCounter.length);
    const mine = state.myCounter[myI], theirs = state.oppCounter[oppI];
    state.myCounter[myI] = theirs; state.oppCounter[oppI] = mine;
    logMsg(`"${card.n}" : tu échanges "${mine.n}" contre "${theirs.n}".`, "you");
    setGuide("Échange", `"${card.n}" te permet d'échanger un trésor avec l'adversaire sans bataille.`);
  } else if (card.effect === "dig") {
    // "Pioche 10 cartes, choisis-en 1" est un choix éclairé — même principe que
    // Cassalla et El jugador de Petrer : on affiche les 10 cartes et on laisse choisir.
    const drawnPool = [];
    for (let i = 0; i < 10; i++) drawnPool.push(drawRandomCard());
    state.pendingDig = { pool: drawnPool };
    state.phase = "digChoice";
    setGuide("Donyet escodrinyador — choisis ta carte", `Tu viens de "regarder" 10 cartes de la pioche. Choisis celle que tu veux garder. Les 9 autres seront remélangées dans la pioche.`);
    render();
    return;
  } else if (card.effect === "mulligan") {
    // "Défausse JUSQU'À 5 cartes" est un choix du joueur — lequel nombre et
    // lesquelles précisément. On ouvre une vraie phase de sélection plutôt que
    // de défausser au hasard à sa place.
    state.pendingMulligan = { selected: [] };
    state.phase = "mulliganChoice";
    setGuide("El jugador de Petrer — choisis tes défausses", `Sélectionne jusqu'à 5 cartes de ta main à défausser (clique pour les ajouter/retirer de la sélection), puis confirme. Tu piocheras autant de nouvelles cartes que tu en as défaussé.`);
    render();
    return;
  } else if (card.effect === "replay") {
    logMsg(`"${card.n}" : tu vas pouvoir enchaîner des actions supplémentaires.`, "you");
    setGuide("Rejoue !", `"${card.n}" te donne 2 actions de plus à la suite. Dans cette version d'entraînement, joue simplement ta prochaine action normalement : le tour ne passe pas à l'adversaire.`);
    logMsg(`"${card.n}" part au cimetière (les cartes spéciales jouées ne vont JAMAIS sur le mostrador — seuls les trésors y restent visibles).`, "system");
    checkWin(); render(); return; // ne termine pas le tour
  } else if (card.effect === "dansa") {
    const drawn = drawCardFor("me");
    logMsg(`"${card.n}" : tu piochés "${drawn.n}" (en partie réelle, le sens du tour changerait aussi — pas de sens de tour à gérer ici, à 2 joueurs).`, "you");
    setGuide("Effet spécial", `"${card.n}" inverse le sens du tour et fait piocher une carte. À 2 joueurs cet effet de sens n'a pas d'impact visible.`);
  } else if (card.effect === "lluna" && state.oppCounter.length >= 0) {
    state.oppHand.push({ type: "special", n: "Lluna de València (forcée)", forced: true, effect: "lluna_force" });
    const drawn = drawCardFor("me");
    logMsg(`"${card.n}" : posée sur le mostrador adverse. À son prochain tour, il devra la défausser et perdra son tour. Tu piochés "${drawn.n}".`, "you");
    setGuide("Effet spécial", `"${card.n}" punit l'adversaire en lui faisant perdre une action complète à son prochain tour.`);
  } else if (card.effect === "beak") {
    if (state.oppHand.length >= 7) {
      const n = Math.min(3, state.oppHand.length);
      const lost = [];
      for (let i = 0; i < n; i++) {
        const r = Math.floor(Math.random() * state.oppHand.length);
        lost.push(state.oppHand[r].n);
        sendToCemetery(state.oppHand[r]);
        state.oppHand.splice(r, 1);
      }
      logMsg(`"${card.n}" : l'adversaire avait ${n + state.oppHand.length} cartes en main (≥7), il perd ${n} carte(s) au hasard : ${lost.join(", ")}.`, "you");
      setGuide("Effet spécial", `"${card.n}" punit les mains trop fournies (7 cartes ou plus). L'adversaire en avait assez pour déclencher l'effet.`);
    } else {
      logMsg(`"${card.n}" : l'adversaire a moins de 7 cartes en main, l'effet ne se déclenche pas (carte jouée pour rien).`, "you");
      setGuide("Effet sans cible", `"${card.n}" ne fonctionne que si l'adversaire a 7 cartes ou plus en main — ce n'est pas le cas ici, donc rien ne se passe. À utiliser au bon moment !`);
    }
  } else if (card.effect === "cremà") {
    const total = state.myCounter.length + state.oppCounter.length;
    state.myCounter.forEach(t => sendToCemetery(t));
    state.oppCounter.forEach(t => sendToCemetery(t));
    state.myCounter = []; state.oppCounter = [];
    logMsg(`"${card.n}" : ${total} trésor(s) au total (les tiens et ceux de l'adversaire) sont défaussés. Les deux mostradors repartent à zéro !`, "you");
    setGuide("Effet dévastateur", `"${card.n}" est une carte à double tranchant : elle te fait aussi perdre tes propres trésors. À réserver pour quand tu es très en retard et que l'adversaire a beaucoup plus à perdre que toi.`);
  } else if (card.effect === "cassalla") {
    if (state.cemetery.length > 0) {
      // "Récupère une carte" est un vrai choix éclairé, pas une pioche au
      // hasard : on ouvre le cimetière pour que tu voies chaque carte et son
      // rôle avant de choisir laquelle ramener.
      state.pendingCassalla = true;
      state.phase = "cassallaChoice";
      setGuide("Cassalla miraculosa — choisis ta carte", `Parcours le cimetière ci-dessous et choisis la carte que tu veux récupérer. Si c'est un trésor, il repartira automatiquement sur ton mostrador ; sinon elle rejoint ta main.`);
      render();
      return;
    } else {
      logMsg(`"${card.n}" : le cimetière est vide, aucune carte à récupérer (carte jouée pour rien).`, "you");
      setGuide("Effet sans cible", `Le cimetière est encore vide en ce début de partie : "${card.n}" n'a rien à récupérer. Mieux vaut la garder pour plus tard.`);
    }
  } else if (card.effect === "pacte") {
    if (state.myCounter.length > 0) {
      const tmp = state.myCounter;
      state.myCounter = state.oppCounter;
      state.oppCounter = tmp;
      logMsg(`"${card.n}" : tu échanges la TOTALITÉ de tes trésors contre la totalité de ceux de l'adversaire.`, "you");
      setGuide("Pacte total", `"${card.n}" échange en bloc tous les mostradors. Risqué si tu as plus d'ingrédients que l'adversaire — vérifie bien avant de la jouer !`);
    } else {
      logMsg(`"${card.n}" : tu n'as aucun trésor, impossible de jouer cette carte (elle nécessite d'en posséder au moins un).`, "you");
      setGuide("Carte injouable", `"${card.n}" est inutilisable sans trésor à échanger. Garde-la pour plus tard.`);
    }
  } else if (card.effect === "muralla" || card.effect === "falla") {
    state.myCounter.push({ type: "treasure", n: card.n, ingredient: false, fr: card.fr, isShield: true });
    logMsg(`"${card.n}" : posée sur ton mostrador comme protection. Elle compte comme un trésor exposé, mais bloque les vols directs.`, "you");
    setGuide("Protection posée", `"${card.n}" — ${card.fr} Note : dans cette version, elle se pose comme un trésor classique sur ton mostrador (visible, vendable si applicable) ; la règle exacte d'opposition lors d'une bataille adverse n'est pas simulée en détail, mais le principe de protection contre le vol direct par carte spéciale est respecté pour les effets "steal"/"swap"/"pacte" que tu pourrais subir.`);
  } else if (card.effect === "butoni") {
    state.oppCounter.push({ type: "treasure", n: card.n, ingredient: false, fr: card.fr, isButoni: true });
    logMsg(`"${card.n}" : posée sur le mostrador adverse. Il ne pourra plus jouer aucune carte spéciale tant qu'elle y reste.`, "you");
    setGuide("Blocage posé", `"${card.n}" empêche l'adversaire d'utiliser des cartes spéciales tant qu'elle reste sur son mostrador. Il peut utiliser un tour entier pour la défausser (non simulé automatiquement ici, mais visible sur son mostrador).`);
  } else if (card.effect === "almansa") {
    if (state.oppCounter.length === 0) {
      logMsg(`"${card.n}" : l'adversaire n'a aucun trésor, impossible de jouer cette carte (carte jouée pour rien).`, "you");
      setGuide("Carte injouable", `"${card.n}" nécessite que l'adversaire ait au moins un trésor à miser. Ce n'est pas le cas, donc rien ne se passe.`);
    } else if (state.myCounter.length === 0) {
      logMsg(`"${card.n}" : tu n'as toi-même aucun trésor à risquer, impossible de jouer cette carte.`, "you");
      setGuide("Carte injouable", `"${card.n}" t'oblige à miser TOUS tes trésors en cas de défaite — tu dois donc en posséder au moins un pour la jouer.`);
    } else {
      const won = Math.random() < 0.5;
      if (won) {
        const taken = state.oppCounter.slice();
        state.myCounter.push(...taken);
        state.oppCounter = [];
        logMsg(`"${card.n}" : bataille à enjeu total remportée ! Tu rafles les ${taken.length} trésor(s) de l'adversaire d'un coup (${taken.map(t=>t.n).join(", ")}).`, "you");
        setGuide("Victoire totale", `"${card.n}" est l'une des cartes les plus risquées et les plus puissantes du jeu : tu viens de rafler tout le mostrador adverse.`);
      } else {
        const given = state.myCounter.slice();
        state.oppCounter.push(...given);
        state.myCounter = [];
        logMsg(`"${card.n}" : bataille à enjeu total perdue. Tu donnes tous tes trésors (${given.length}) à l'adversaire (${given.map(t=>t.n).join(", ")}).`, "you");
        setGuide("Défaite totale", `"${card.n}" a un revers brutal : en cas de défaite, c'est TOI qui perds tout. À réserver pour les situations désespérées où tu n'as plus grand-chose à perdre.`);
      }
    }
  } else if (card.effect === "riua") {
    const myGiven = state.myCounter.slice();
    const oppGiven = state.oppCounter.slice();
    state.oppCounter = myGiven;
    state.myCounter = oppGiven;
    logMsg(`"${card.n}" : tous les trésors changent de mains entre les deux joueurs (niveau 9, rien ne peut l'annuler).`, "you");
    setGuide("La riada", `"${card.n}" redistribue tous les trésors d'un coup. À 2 joueurs, ton mostrador et celui de l'adversaire sont simplement échangés intégralement.`);
  } else {
    logMsg(`"${card.n}" (niveau ${card.level}) — ${card.fr}`, "you");
    setGuide("Carte spéciale jouée", `"${card.n}" — ${card.fr}`);
  }

  logMsg(`"${card.n}" part au cimetière (les cartes spéciales jouées ne vont JAMAIS sur le mostrador — seuls les trésors y restent visibles).`, "system");

  checkWin();
  if (!state.gameOver) endPlayerTurn();
  render();
}

function almoina() {
  const card = drawCardFor("me");
  if (card.type === "treasure") {
    logMsg(`Almoina : tu piochés "${card.n}", qui part directement sur ton mostrador.`, "you");
    setGuide("Almoina", `Quand aucune carte en main ne te convient, piocher sans rien jouer reste une action à part entière. Ici tu as pioché un trésor : il est posé automatiquement sur ton mostrador, visible de l'adversaire — ce n'est jamais toi qui choisis de le garder caché.`);
  } else {
    logMsg(`Almoina : tu piochés "${card.n}".`, "you");
    setGuide("Almoina", `Quand aucune carte en main ne te convient, piocher sans rien jouer reste une action à part entière. C'est l'une des SEULES façons de piocher en dehors d'un effet de carte (vente de trésor ou carte spéciale) : le jeu ne te distribue jamais de carte automatiquement entre les tours.`);
  }
  endPlayerTurn();
  render();
}

/* ============== TOUR DE L'IA (mode "sympa") ============== */
function endPlayerTurn() { state.phase = "opponent"; }

// Réplique côté IA de playSpecial() : permet à l'adversaire de jouer N'IMPORTE
// QUELLE carte spéciale de tour normal, avec la même richesse d'options que toi.
// Retourne true si une action a bien été jouée (pour ne pas enchaîner plusieurs branches).
function aiPlayNormalSpecial(card, idx) {
  state.oppHand.splice(idx, 1);
  sendToCemetery(card);

  if (card.effect === "steal" && state.myCounter.length > 0) {
    const i = Math.floor(Math.random() * state.myCounter.length);
    const stolen = state.myCounter[i];
    state.oppCounter.push(stolen);
    state.myCounter.splice(i, 1);
    logMsg(`L'adversaire joue "${card.n}" : vol direct de "${stolen.n}", sans bataille.`, "opp");
    setGuide("Tour de l'adversaire", `"${card.n}" lui a permis de voler "${stolen.n}" directement.`);
  } else if (card.effect === "swap" && state.myCounter.length > 0 && state.oppCounter.length > 0) {
    const myI = Math.floor(Math.random() * state.myCounter.length);
    const oppI = Math.floor(Math.random() * state.oppCounter.length);
    const mine = state.myCounter[myI], theirs = state.oppCounter[oppI];
    state.myCounter[myI] = theirs; state.oppCounter[oppI] = mine;
    logMsg(`L'adversaire joue "${card.n}" : il échange son trésor "${theirs.n}" contre ton "${mine.n}".`, "opp");
    setGuide("Tour de l'adversaire", `Échange forcé : "${theirs.n}" est maintenant sur ton mostrador.`);
  } else if (card.effect === "dig") {
    const drawn = []; for (let i = 0; i < 10; i++) drawn.push(drawRandomCard());
    const kept = rnd(drawn);
    if (kept.type === "treasure") state.oppCounter.push(kept); else state.oppHand.push(kept);
    logMsg(`L'adversaire joue "${card.n}" : il fouille 10 cartes de la pioche et en garde 1.`, "opp");
    setGuide("Tour de l'adversaire", `"${card.n}" lui a permis de choisir une bonne carte parmi 10.`);
  } else if (card.effect === "mulligan") {
    const n = Math.min(5, state.oppHand.length);
    for (let i = 0; i < n; i++) { const r = Math.floor(Math.random() * state.oppHand.length); state.oppHand.splice(r, 1); }
    for (let i = 0; i < n; i++) drawCardFor("opp");
    logMsg(`L'adversaire joue "${card.n}" : il défausse ${n} carte(s) et en pioche autant.`, "opp");
    setGuide("Tour de l'adversaire", `Il a renouvelé sa main.`);
  } else if (card.effect === "dansa") {
    const drawn = drawCardFor("opp");
    logMsg(`L'adversaire joue "${card.n}" : il pioche "${drawn.n}".`, "opp");
    setGuide("Tour de l'adversaire", `Effet de sens de tour sans impact à 2 joueurs, mais il a pioché une carte.`);
  } else if (card.effect === "lluna") {
    state.myHand.push({ type: "special", n: "Lluna de València (forcée)", forced: true, effect: "lluna_force" });
    const drawn = drawCardFor("opp");
    logMsg(`L'adversaire joue "${card.n}" sur ton mostrador : tu devras la défausser à ton prochain tour et perdras ton action. Il pioche "${drawn.n}".`, "opp");
    setGuide("Tour de l'adversaire", `Tu seras forcé de défausser cette carte à ton prochain tour, sans rien pouvoir faire d'autre.`);
  } else if (card.effect === "beak") {
    if (state.myHand.length >= 7) {
      const n = Math.min(3, state.myHand.length);
      const lost = [];
      for (let i = 0; i < n; i++) {
        const r = Math.floor(Math.random() * state.myHand.length);
        lost.push(state.myHand[r].n);
        sendToCemetery(state.myHand[r]);
        state.myHand.splice(r, 1);
      }
      logMsg(`L'adversaire joue "${card.n}" : tu avais 7 cartes ou plus, tu perds ${n} carte(s) au hasard (${lost.join(", ")}).`, "opp");
      setGuide("Tour de l'adversaire", `Ta main trop fournie t'a coûté ${n} carte(s).`);
    } else {
      logMsg(`L'adversaire joue "${card.n}", mais tu as moins de 7 cartes : aucun effet (carte jouée pour rien).`, "opp");
      setGuide("Tour de l'adversaire", `L'adversaire a joué cette carte sans condition remplie — elle est perdue pour rien.`);
    }
  } else if (card.effect === "cremà") {
    const total = state.myCounter.length + state.oppCounter.length;
    state.myCounter.forEach(t => sendToCemetery(t));
    state.oppCounter.forEach(t => sendToCemetery(t));
    state.myCounter = []; state.oppCounter = [];
    logMsg(`L'adversaire joue "${card.n}" : ${total} trésor(s) au total sont défaussés, les deux mostradors repartent à zéro.`, "opp");
    setGuide("Tour de l'adversaire", `Coup risqué de l'adversaire : il perd aussi ses propres trésors.`);
  } else if (card.effect === "cassalla") {
    if (state.cemetery.length > 0) {
      const i = Math.floor(Math.random() * state.cemetery.length);
      const recovered = state.cemetery[i];
      state.cemetery.splice(i, 1);
      state.oppHand.push(recovered);
      logMsg(`L'adversaire joue "${card.n}" : il récupère "${recovered.n}" depuis le cimetière.`, "opp");
      setGuide("Tour de l'adversaire", `Il vient de repêcher une carte déjà utilisée.`);
    } else {
      logMsg(`L'adversaire joue "${card.n}", mais le cimetière est vide : aucun effet.`, "opp");
      setGuide("Tour de l'adversaire", `Carte jouée pour rien, le cimetière était vide.`);
    }
  } else if (card.effect === "pacte") {
    if (state.oppCounter.length > 0) {
      const tmp = state.oppCounter;
      state.oppCounter = state.myCounter;
      state.myCounter = tmp;
      logMsg(`L'adversaire joue "${card.n}" : il échange la TOTALITÉ de ses trésors contre les tiens.`, "opp");
      setGuide("Tour de l'adversaire", `Échange total des mostradors !`);
    } else {
      logMsg(`L'adversaire tente "${card.n}" mais n'a aucun trésor : carte injouable, perdue pour rien.`, "opp");
      setGuide("Tour de l'adversaire", `Effet sans cible.`);
    }
  } else if (card.effect === "muralla" || card.effect === "falla") {
    state.oppCounter.push({ type: "treasure", n: card.n, ingredient: false, fr: card.fr, isShield: true });
    logMsg(`L'adversaire pose "${card.n}" sur son mostrador comme protection.`, "opp");
    setGuide("Tour de l'adversaire", `Il vient de se protéger contre certains types de vol.`);
  } else if (card.effect === "butoni") {
    state.myCounter.push({ type: "treasure", n: card.n, ingredient: false, fr: card.fr, isButoni: true });
    logMsg(`L'adversaire pose "${card.n}" sur TON mostrador : tu ne pourras plus jouer de carte spéciale tant qu'elle y reste.`, "opp");
    setGuide("Tour de l'adversaire", `Tes cartes spéciales sont bloquées jusqu'à ce que cette carte soit retirée.`);
  } else if (card.effect === "almansa") {
    if (state.myCounter.length === 0 || state.oppCounter.length === 0) {
      logMsg(`L'adversaire tente "${card.n}" mais les conditions ne sont pas réunies : carte perdue pour rien.`, "opp");
      setGuide("Tour de l'adversaire", `Effet sans cible.`);
    } else {
      const won = Math.random() < 0.5;
      if (won) {
        const taken = state.myCounter.slice();
        state.oppCounter.push(...taken);
        state.myCounter = [];
        logMsg(`L'adversaire joue "${card.n}" et gagne la bataille à enjeu total : il rafle TOUS tes trésors (${taken.length}) !`, "opp");
        setGuide("Tour de l'adversaire", `Coup dur : tu perds tout ton mostrador d'un coup.`);
      } else {
        const given = state.oppCounter.slice();
        state.myCounter.push(...given);
        state.oppCounter = [];
        logMsg(`L'adversaire joue "${card.n}" mais perd la bataille à enjeu total : il te donne TOUS ses trésors (${given.length}) !`, "opp");
        setGuide("Tour de l'adversaire", `Cadeau inattendu : tu récupères tout son mostrador.`);
      }
    }
  } else if (card.effect === "riua") {
    const tmp = state.oppCounter;
    state.oppCounter = state.myCounter;
    state.myCounter = tmp;
    logMsg(`L'adversaire joue "${card.n}" : tous les trésors changent de mains entre les deux joueurs.`, "opp");
    setGuide("Tour de l'adversaire", `Redistribution totale ! Niveau 9, rien ne peut l'annuler.`);
  } else if (card.effect === "replay") {
    logMsg(`L'adversaire joue "${card.n}" : il enchaîne des actions supplémentaires.`, "opp");
    setGuide("Tour de l'adversaire", `"${card.n}" lui permet de continuer à jouer sans te rendre la main tout de suite.`);
    return "replay";
  } else {
    return false; // pas de cas géré à un tour normal (masclet, protect, spy, aigua, espill)
  }
  return true;
}

function playOpponentTurn() {
  if (state.gameOver) return;

  // Si Lluna de València forcée est dans la main adverse, elle doit la jouer/défausser en priorité
  const lunaIdx = state.oppHand.findIndex(c => c.effect === "lluna_force");
  if (lunaIdx !== -1) {
    state.oppHand.splice(lunaIdx, 1);
    logMsg(`L'adversaire doit défausser la "Lluna de València" reçue : il perd son tour.`, "opp");
    setGuide("Tour de l'adversaire", `L'adversaire était forcé de défausser la Lluna de València et ne peut rien faire d'autre ce tour. À toi !`);
    state.turn++; state.phase = "player"; render(); return;
  }

  // L'IA dispose exactement des mêmes options que toi : attaquer en bataille,
  // jouer N'IMPORTE QUELLE carte spéciale qu'elle a en main (offensive ciblante,
  // ou à effet de tour normal), vendre un trésor de vente déjà sur son
  // mostrador, ou almoina. Les probabilités varient selon le niveau choisi.
  const ai = getAiParams();
  const sellableIdx = state.oppCounter.findIndex(c => c.sell);
  const strongBattleIdx = state.oppHand.findIndex(c => c.type === "battle" && (c.a ?? 0) >= ai.minAtt);
  const targetingSpecialIdx = state.oppHand.findIndex(c => c.type === "special" && (c.effect === "steal" || c.effect === "swap") && state.myCounter.length > 0);
  // Cartes spéciales jouables à un tour normal (tout sauf les 5 réservées aux phases de bataille/réaction)
  const normalSpecialIdx = state.oppHand.findIndex(c => c.type === "special" && !["masclet", "protect", "spy", "aigua", "espill"].includes(c.effect));

  const willAttack = strongBattleIdx !== -1 && state.myCounter.length > 0 && Math.random() < ai.pAttack;
  const willTargetSpecial = !willAttack && targetingSpecialIdx !== -1 && Math.random() < ai.pTargetSpecial;
  const willPlayNormalSpecial = !willAttack && !willTargetSpecial && normalSpecialIdx !== -1 && Math.random() < ai.pNormalSpecial;
  const willSell = !willAttack && !willTargetSpecial && !willPlayNormalSpecial && sellableIdx !== -1 && Math.random() < ai.pSell;

  if (willTargetSpecial) {
    const card = state.oppHand[targetingSpecialIdx];
    state.oppHand.splice(targetingSpecialIdx, 1);

    // Fenêtre de réaction : si tu as Paella protectora en main, tu peux l'engager
    // pour annuler cette carte spéciale avant qu'elle ne fasse effet.
    state.pendingOppSpecial = { card };
    state.phase = "reactToOppSpecial";
    logMsg(`L'adversaire joue "${card.n}" et te cible directement !`, "opp");
    const hasProtect = state.myHand.some(c => c.effect === "protect");
    setGuide("L'adversaire te cible avec une carte spéciale !", `"${card.n}" — ${card.fr} ${hasProtect ? `Tu as "Paella protectora" en main : tu peux l'engager pour annuler cet effet (niveau ${card.level} contre niveau 3 — ça fonctionne sauf exception comme la Riuà).` : "Tu n'as pas de Paella protectora en main pour t'en protéger cette fois."}`);
    render();
    return;
  }

  if (willAttack) {
    let myCard = state.oppHand[strongBattleIdx];
    // Ciblage : les niveaux avancé/expert visent en priorité tes ingrédients.
    let targetIdx;
    if (ai.targetIngredients) {
      const ingIdx = state.myCounter.findIndex(c => c.ingredient);
      targetIdx = ingIdx !== -1 ? ingIdx : Math.floor(Math.random() * state.myCounter.length);
    } else {
      targetIdx = Math.floor(Math.random() * state.myCounter.length);
    }
    const target = state.myCounter[targetIdx];
    state.oppHand.splice(strongBattleIdx, 1);
    sendToCemetery(myCard);

    // L'IA peut engager Masclet et/ou Espill lluent selon son niveau.
    const mascletIdx = state.oppHand.findIndex(c => c.effect === "masclet");
    if (mascletIdx !== -1 && Math.random() < ai.pMasclet) {
      const mascletCard = state.oppHand[mascletIdx];
      state.oppHand.splice(mascletIdx, 1);
      sendToCemetery(mascletCard);
      const n = Math.min(2, state.myHand.length);
      const lost = [];
      for (let i = 0; i < n; i++) {
        const r = Math.floor(Math.random() * state.myHand.length);
        lost.push(state.myHand[r].n);
        sendToCemetery(state.myHand[r]);
        state.myHand.splice(r, 1);
      }
      logMsg(`L'adversaire engage "${mascletCard.n}" avant d'attaquer : tu perds ${n} carte(s) au hasard (${lost.join(", ") || "rien à perdre"}).`, "opp");
    }
    const espillIdx = state.oppHand.findIndex(c => c.effect === "espill");
    if (espillIdx !== -1 && Math.random() < ai.pEspill) {
      const espillCard = state.oppHand[espillIdx];
      state.oppHand.splice(espillIdx, 1);
      sendToCemetery(espillCard);
      const oldA = myCard.a, oldD = myCard.d;
      myCard.a = oldD; myCard.d = oldA;
      logMsg(`L'adversaire engage "${espillCard.n}" sur sa carte d'attaque : ses valeurs ATT/DEF sont inversées (ATT ${myCard.a} désormais).`, "opp");
    }

    // On ne résout plus tout de suite : on ouvre une fenêtre de défense où TOI
    // tu choisis ta carte (ou de ne pas te défendre), et où tu peux engager
    // Espionatge / Aigua de València / Espill lluent / Paella protectora si tu
    // les as en main — exactement comme un vrai défenseur dans le jeu.
    state.pendingDefense = { attackerCard: myCard, targetIdx, defAtkMalus: 0 };
    state.phase = "defenseChoice";
    const myDefenseCards = state.myHand.filter(c => c.type === "battle");
    const spyCard = state.myHand.find(c => c.effect === "spy");
    const revealNote = spyCard ? ` Tu as "Espionatge" en main : la carte adverse t'est déjà révélée grâce à elle.` : ` Tu ne sais pas quelle carte l'adversaire a engagée (sauf si tu joues Espionatge).`;
    logMsg(`L'adversaire déclare une bataille pour "${target.n}" !`, "opp");
    setGuide("L'adversaire t'attaque !", `Bataille déclarée pour "${target.n}".${revealNote} ${myDefenseCards.length > 0 ? "Choisis ta carte de défense ci-dessous, ou décide de ne pas te défendre." : "Tu n'as aucune carte de bataille en main : tu ne pourras pas te défendre."} Tu peux aussi engager une carte spéciale de défense (Aigua de València, Espill lluent, Paella protectora) si tu en as.`);
    render();
    return;
  } else if (willPlayNormalSpecial) {
    const card = state.oppHand[normalSpecialIdx];
    const result = aiPlayNormalSpecial(card, normalSpecialIdx);
    if (result === "replay") {
      // Repetició : l'IA enchaîne immédiatement une action de plus, sans te rendre la main.
      checkWin();
      if (!state.gameOver) { render(); setTimeout(playOpponentTurn, 700); return; }
    }
  } else if (willSell) {
    const card = state.oppCounter[sellableIdx];
    const amount = card.effectTag === "santcalze" ? Math.max(0, 7 - state.oppCounter.length) : card.sell;
    state.oppCounter.splice(sellableIdx, 1);
    sendToCemetery(card);
    for (let i = 0; i < amount; i++) drawCardFor("opp");
    logMsg(`L'adversaire vend "${card.n}" contre ${amount} nouvelle(s) carte(s).`, "opp");
    setGuide("Tour de l'adversaire", `L'adversaire a vendu un trésor déjà sur son mostrador pour se renouveler en cartes.`);
  } else {
    const card = drawCardFor("opp");
    if (card.type === "treasure") logMsg(`L'adversaire fait almoina et pioche "${card.n}", qui part directement sur son mostrador.`, "opp");
    else logMsg(`L'adversaire fait almoina et pioche.`, "opp");
    setGuide("Tour de l'adversaire", `L'adversaire n'avait rien d'utile à jouer et a juste pioché. À toi de jouer !`);
  }

  checkWin();
  if (!state.gameOver) { state.turn++; state.phase = "player"; }
  render();
}

/* ============== RENDU CARTE ============== */
function renderCard(c, mini) {
  const cls = mini ? "playcard mini" : "playcard";
  if (c.type === "treasure") {
    let subClass = "is-passive";
    let categoryLabel = t("catPassiveCard");
    if (c.ingredient) { subClass = "is-ingredient"; categoryLabel = t("catIngCard"); }
    else if (c.sell === "variable") { subClass = "is-sellable"; categoryLabel = t("catSellVar"); }
    else if (c.effectTag === "dolçaina") { subClass = "is-sellable"; categoryLabel = t("catSellReplay", {N: c.sell}); }
    else if (c.sell) { subClass = "is-sellable"; categoryLabel = t("catSellCard", {N: c.sell}); }

    let inner = `<div class="pc-category">${categoryLabel}</div>`;
    inner += `<div class="pc-skull">${skullEmoji(c.type)}</div><div class="pc-name">${c.n}</div>`;
    inner += `<div class="pc-foot">${cardDesc(c)}</div>`;
    if (c.ingredient) inner = `<div class="pc-ingredient-tag">🥘</div>` + inner;
    return `<div class="${cls} treasure ${subClass}">${inner}</div>`;
  }

  let catLabel = c.type === "battle" ? t("catBattleCard") : t("catSpecialCard");
  let inner = `<div class="pc-category">${catLabel}</div>`;
  inner += `<div class="pc-skull">${skullEmoji(c.type)}</div><div class="pc-name">${c.n}</div>`;
  if (c.type === "battle") {
    inner += `<div class="pc-stats"><span class="a">ATT ${c.a ?? "?"}</span><span class="d">DEF ${c.d ?? "?"}</span></div>`;
    if (!mini) inner += `<div class="pc-foot">${cardDesc(c)}</div>`;
  } else {
    inner += `<div class="pc-foot">${mini ? t("catSpecialMini", {N: c.level ?? ""}) : cardDesc(c)}</div>`;
    inner = `<div class="pc-level">${c.level ?? ""}</div>` + inner;
  }
  return `<div class="${cls} ${c.type}">${inner}</div>`;
}

/* ============== RENDU PRINCIPAL ============== */
function render() {
  const app = document.getElementById("app");

  if (state.gameOver === "win" || state.gameOver === "lose") {
    const isWin = state.gameOver === "win";
    app.innerHTML = `
      <div class="game-over ${isWin ? 'win' : 'lose'}">
        <h2>${isWin ? t("winMsg") : t("loseMsg")}</h2>
        <p style="color: var(--paper-darker); font-size: 0.85rem;">${t("turns", {N: state.turn})}</p>
        <button class="primary" onclick="newGame()">${t("rejouer")}</button>
      </div>`;
    return;
  }

  if (state.phase === "battleReveal" && state.battleReveal) {
    const r = state.battleReveal;
    const atkWins = r.won;
    let html = `<div class="reveal-box">`;
    html += `<div class="reveal-title">⚔ Résultat du combat ⚔</div>`;
    html += `<div class="reveal-target">Trésor en jeu : <strong>${r.target.n}</strong></div>`;

    html += `<div class="reveal-vs-row">`;
    const atkIsWinner = atkWins;
    html += `<div class="reveal-side ${atkIsWinner ? 'winner' : 'loser'}">
      ${atkIsWinner ? '<div class="reveal-crown">👑</div>' : ''}
      <div class="reveal-who">${r.attacker.who} (attaque)</div>
      ${renderCard(r.attacker.card, true)}
      <div class="reveal-value">${r.attacker.label} ${r.attacker.value}</div>
    </div>`;

    if (r.defender) {
      html += `<div class="reveal-vs-label">VS</div>`;
      const defIsWinner = !atkWins;
      html += `<div class="reveal-side ${defIsWinner ? 'winner' : 'loser'}">
        ${defIsWinner ? '<div class="reveal-crown">👑</div>' : ''}
        <div class="reveal-who">${r.defender.who} (défense)</div>
        ${renderCard(r.defender.card, true)}
        <div class="reveal-value">${r.defender.label} ${r.defender.value}</div>
      </div>`;
    } else {
      html += `<div class="reveal-vs-label">VS</div>
        <div class="reveal-side loser">
          <div class="reveal-who">Aucune défense</div>
          <div style="width:112px; min-height:148px; display:flex; align-items:center; justify-content:center; border:2px dashed var(--paper-darker); border-radius:6px; opacity:0.5; font-family:'IM Fell English SC',serif; font-size:0.62rem; padding:6px; color:var(--paper-darker);">Pas de carte présentée</div>
        </div>`;
    }
    html += `</div>`;

    html += `<div class="reveal-target-card">
      <div class="reveal-target-label">${r.targetWinner === "you" ? "Ce trésor rejoint TON mostrador" : "Ce trésor rejoint le mostrador ADVERSE"} :</div>
      ${renderCard(r.target, true)}
    </div>`;

    html += `<p class="reveal-text"><strong>${r.title}</strong><br>${r.text}</p>`;
    html += `<button class="primary" onclick="continueAfterReveal()">Continuer</button>`;
    html += `</div>`;

    document.getElementById("app").innerHTML = html;
    const logEl = document.getElementById("app-log");
    if (logEl) {
      let logHtml = "";
      state.log.forEach(m => { logHtml += `<p class="${m.cls}">${m.text}</p>`; });
      logEl.innerHTML = logHtml;
      logEl.scrollTop = logEl.scrollHeight;
    }
    return;
  }

  let html = "";
  let asideHtml = "";

  if (showGuide && state.guideMsg) {
    asideHtml += `<div class="guide-box">
      <div class="icon">💡</div>
      <div>
        <div class="guide-title">${state.guideMsg.title}</div>
        <p>${state.guideMsg.text}</p>
        <button class="toggle-guide" onclick="showGuide=false; render();">Masquer le guide</button>
      </div>
    </div>`;
  } else {
    asideHtml += `<div class="actions-row" style="margin-bottom: 0.5rem;">
      <button class="toggle-guide" style="font-size:0.75rem;" onclick="showGuide=true; render();">Réafficher le guide</button>
    </div>`;
  }

  const oppHandWarning = state.oppHand.length >= 7;
  html += `<div class="row">
    <span class="badge">${t("turn")} ${state.turn}</span>
    <span class="badge">${t("ingScore", {MY: countIngredients(state.myCounter), OPP: countIngredients(state.oppCounter)})}</span>
    <span class="badge">${t("cemetery", {N: state.cemetery.length})}</span>
  </div>`;

  if (state.cemetery.length > 0) {
    html += `<details class="cardex" style="margin-bottom:1.25rem;"><summary>Voir le contenu du cimetière (utile pour "Cassalla miraculosa")</summary><div class="cardex-grid">`;
    state.cemetery.forEach(c => { html += `<div class="ce"><b>${c.n}</b></div>`; });
    html += `</div></details>`;
  }

  if (state.phase === "player") {
    const tips = buildStrategyTips();
    asideHtml += `<div class="strategy-box">
      <div class="strategy-title">🧭 Conseil tactique pour ce tour</div>
      <ul>${tips.map(t => `<li>${t}</li>`).join("")}</ul>
      <div class="hand-state">Main actuelle : ${state.myHand.length} carte(s) — ${state.myHand.filter(c=>c.type==='battle').length} bataille, ${state.myHand.filter(c=>c.type==='special').length} spéciale(s). (Les trésors ne passent jamais par la main : ils vont automatiquement sur ton mostrador.)</div>
    </div>`;
  } else if (state.phase === "setup") {
    asideHtml += `<div class="strategy-box">
      <div class="strategy-title">🧭 Étape de mise en place</div>
      <ul><li>Avant de pouvoir jouer ton premier tour, tu dois poser <b>tous les trésors</b> reçus dans ta donne de 7 cartes. Regarde ta main ci-dessous : chaque carte trésor a un bouton "Poser sur le mostrador (obligatoire)". Clique dessus une par une.</li></ul>
    </div>`;
  }

  html += `<div class="section-title">${t("oppCounter")} <span class="hand-count${oppHandWarning ? ' alert' : ''}">${t("handCount", {N: state.oppHand.length, S: ""})}${oppHandWarning ? t("handAlert") : ''}</span></div><div class="counter-area">`;
  if (state.oppCounter.length === 0) html += `<span class="empty-hint">${t("emptyCounter")}</span>`;
  state.oppCounter.forEach(t => { html += renderCard(t, true); });
  html += `</div>`;

  const myDisabled = state.phase !== "player";
  html += `<div class="section-title">${t("myCounter")} <span class="hand-count">${t("handCount", {N: state.myHand.length, S: ""})}</span></div><div class="counter-area">`;
  if (state.myCounter.length === 0) html += `<span class="empty-hint">${t("emptyCounter")}</span>`;
  state.myCounter.forEach((trs, i) => {
    html += `<div class="card-slot">`;
    html += renderCard(trs, true);
    if (trs.sell) {
      let label;
      if (trs.effectTag === "santcalze") {
        const amount = Math.max(0, 7 - state.myCounter.length);
        label = t("vendreVar", {N: amount});
      } else if (trs.effectTag === "dolçaina") {
        label = t("vendrePlus", {N: trs.sell});
      } else {
        label = t("vendre", {N: trs.sell});
      }
      html += `<button class="card-action-btn" onclick="sellTreasureFromCounter(${i})" ${myDisabled ? 'disabled' : ''}>${label}</button>`;
    }
    html += `</div>`;
  });
  html += `</div>`;

  if (state.phase === "battleChoice" && state.pendingBattle) {
    const myCard = state.myHand[state.pendingBattle.cardIdx];
    html += `<div class="battle-box">
      <p><strong>Bataille avec "${myCard.n}"</strong> (ATT ${myCard.a ?? "?"}) — choisis la cible :</p>
      <div class="target-list">`;
    state.oppCounter.forEach((t, i) => {
      const sel = i === state.pendingBattle.targetIdx;
      html += `<div class="mini-wrap ${sel ? 'selected' : ''}" onclick="state.pendingBattle.targetIdx=${i}; render();">${renderCard(t, true)}</div>`;
    });
    html += `</div>
      <div class="actions-row">
        <button class="primary" onclick="confirmBattle()">Lancer la bataille</button>
        <button class="danger" onclick="cancelBattle()">Annuler</button>
      </div>
    </div>`;
  }

  if (state.phase === "battlePrep" && state.pendingBattle) {
    const myCard = state.myHand[state.pendingBattle.cardIdx];
    const target = state.oppCounter[state.pendingBattle.targetIdx];
    const prepSpecials = state.myHand
      .map((c, i) => ({ c, i }))
      .filter(({ c }) => ["masclet", "espill", "aigua"].includes(c.effect));

    html += `<div class="battle-box">
      <p><strong>Préparation</strong> : "${myCard.n}" (ATT ${myCard.a ?? "?"}) posée face cachée contre "${target.n}".</p>`;

    if (prepSpecials.length > 0) {
      html += `<p style="font-size:0.8rem; opacity:0.85;">Tu peux engager une carte spéciale de combat avant la révélation :</p>
        <div class="hand-zone" style="margin-bottom:10px;">`;
      prepSpecials.forEach(({ c, i }) => {
        html += `<div class="card-slot">${renderCard(c, true)}<button class="card-action-btn" onclick="playBattlePrepSpecial(${i})">Engager</button></div>`;
      });
      html += `</div>`;
    } else {
      html += `<p style="font-size:0.8rem; opacity:0.7; font-style:italic;">Aucune carte spéciale de combat en main (Masclet, Espill lluent, Aigua de València) — rien à engager.</p>`;
    }

    html += `<div class="actions-row">
        <button class="primary" onclick="launchBattleResolution()">Révéler et résoudre la bataille</button>
        <button class="danger" onclick="cancelBattle()">Annuler la bataille</button>
      </div>
    </div>`;
  }

  if (state.phase === "defenseChoice" && state.pendingDefense) {
    const atk = state.pendingDefense.attackerCard;
    const target = state.myCounter[state.pendingDefense.targetIdx];
    const hasSpy = state.myHand.some(c => c.effect === "spy");
    const myDefenseCards = state.myHand.map((c, i) => ({ c, i })).filter(({ c }) => c.type === "battle");
    const defPrepSpecials = state.myHand.map((c, i) => ({ c, i })).filter(({ c }) => ["aigua", "espill", "protect"].includes(c.effect));

    html += `<div class="battle-box">
      <p><strong>L'adversaire attaque !</strong> Il vise "${target.n}" avec ${hasSpy ? `"${atk.n}" (ATT ${atk.a ?? "?"}) — révélée grâce à ton Espionatge` : "une carte cachée"}.</p>`;

    if (defPrepSpecials.length > 0) {
      html += `<p style="font-size:0.8rem; opacity:0.85;">Cartes spéciales de défense disponibles :</p>
        <div class="hand-zone" style="margin-bottom:10px;">`;
      defPrepSpecials.forEach(({ c, i }) => {
        html += `<div class="card-slot">${renderCard(c, true)}<button class="card-action-btn" onclick="playDefensePrepSpecial(${i})">Engager</button></div>`;
      });
      html += `</div>`;
    }

    if (myDefenseCards.length > 0) {
      html += `<p style="font-size:0.8rem; opacity:0.85;">Choisis ta carte de défense :</p>
        <div class="hand-zone" style="margin-bottom:10px;">`;
      myDefenseCards.forEach(({ c, i }) => {
        const sel = state.pendingDefense.chosenDefIdx === i;
        html += `<div class="card-slot">${renderCard(c, true)}<button class="card-action-btn ${sel ? 'primary' : ''}" onclick="chooseDefenseCard(${i})">${sel ? "Sélectionnée ✓" : "Choisir"}</button></div>`;
      });
      html += `</div>`;
    } else {
      html += `<p style="font-size:0.8rem; opacity:0.7; font-style:italic;">Tu n'as aucune carte de bataille en main pour te défendre.</p>`;
    }

    html += `<div class="actions-row">
        <button class="primary" onclick="resolveDefense(false)" ${state.pendingDefense.chosenDefIdx == null ? 'disabled' : ''}>Révéler avec ma carte choisie</button>
        <button class="danger" onclick="resolveDefense(true)">Ne pas se défendre</button>
      </div>
    </div>`;
  }

  if (state.phase === "reactToOppSpecial" && state.pendingOppSpecial) {
    const { card } = state.pendingOppSpecial;
    const protectIdxs = state.myHand.map((c, i) => ({ c, i })).filter(({ c }) => c.effect === "protect");

    html += `<div class="battle-box">
      <p><strong>L'adversaire te cible !</strong> "${card.n}" (niveau ${card.level}) — ${card.fr}</p>`;

    if (protectIdxs.length > 0) {
      html += `<p style="font-size:0.8rem; opacity:0.85;">Tu as Paella protectora en main :</p>
        <div class="hand-zone" style="margin-bottom:10px;">`;
      protectIdxs.forEach(({ c, i }) => {
        html += `<div class="card-slot">${renderCard(c, true)}<button class="card-action-btn primary" onclick="usePaellaProtectora(${i})">Engager pour annuler</button></div>`;
      });
      html += `</div>`;
    } else {
      html += `<p style="font-size:0.8rem; opacity:0.7; font-style:italic;">Tu n'as pas de Paella protectora en main pour t'en protéger cette fois.</p>`;
    }

    html += `<div class="actions-row">
        <button class="danger" onclick="letOppSpecialResolve()">Laisser l'effet se produire</button>
      </div>
    </div>`;
  }

  if (state.phase === "mulliganChoice" && state.pendingMulligan) {
    const sel = state.pendingMulligan.selected;
    html += `<div class="battle-box">
      <p><strong>El jugador de Petrer</strong> — sélectionne jusqu'à 5 cartes à défausser (${sel.length}/5 choisie(s)) :</p>
      <div class="hand-zone" style="margin-bottom:10px;">`;
    state.myHand.forEach((c, i) => {
      const isSel = sel.includes(i);
      html += `<div class="card-slot">
        <div class="mini-wrap ${isSel ? 'selected' : ''}" onclick="toggleMulliganCard(${i})" style="cursor:pointer;">${renderCard(c, true)}</div>
        <button class="card-action-btn ${isSel ? 'primary' : ''}" onclick="toggleMulliganCard(${i})">${isSel ? "Sélectionnée ✓" : "Choisir"}</button>
      </div>`;
    });
    html += `</div>
      <div class="actions-row">
        <button class="primary" onclick="confirmMulligan()">Confirmer la défausse (${sel.length} carte${sel.length !== 1 ? 's' : ''})</button>
      </div>
    </div>`;
  }

  if (state.phase === "cassallaChoice" && state.pendingCassalla) {
    html += `<div class="battle-box">
      <p><strong>Cassalla miraculosa</strong> — choisis la carte à récupérer dans le cimetière (${state.cemetery.length} carte${state.cemetery.length !== 1 ? 's' : ''} disponible${state.cemetery.length !== 1 ? 's' : ''}) :</p>
      <div class="hand-zone" style="margin-bottom:10px;">`;
    state.cemetery.forEach((c, i) => {
      html += `<div class="card-slot">
        ${renderCard(c, false)}
        <button class="card-action-btn primary" onclick="chooseCassallaCard(${i})">Récupérer</button>
      </div>`;
    });
    html += `</div>
    </div>`;
  }

  if (state.phase === "digChoice" && state.pendingDig) {
    html += `<div class="battle-box">
      <p><strong>Donyet escodrinyador</strong> — tu "regardes" ces 10 cartes, choisis celle que tu gardes (les 9 autres repartent dans la pioche) :</p>
      <div class="hand-zone" style="margin-bottom:10px;">`;
    state.pendingDig.pool.forEach((c, i) => {
      html += `<div class="card-slot">
        ${renderCard(c, false)}
        <button class="card-action-btn primary" onclick="chooseDigCard(${i})">Garder</button>
      </div>`;
    });
    html += `</div>
    </div>`;
  }

  const disabled = state.phase !== "player";
  const inSetup = state.phase === "setup";

  if (inSetup) {
    html += `<div class="almoina-bar"><button class="almoina-btn" disabled title="Termine d'abord de poser tous tes trésors de départ">⛔ ${t("almoina")}</button></div>`;
  } else {
    html += `<div class="almoina-bar"><button class="almoina-btn" onclick="almoina()" ${disabled ? 'disabled' : ''}>🃏 ${t("almoina")}</button></div>`;
  }

  html += `<div class="section-title">${t("myHand", {N: state.myHand.length})}</div><div class="hand-zone">`;
  state.myHand.forEach((c, i) => {
    html += `<div class="card-slot">`;
    html += renderCard(c, false);
    if (c.type === "treasure") {
      // Pendant la mise en place, ces trésors doivent être posés MANUELLEMENT par le joueur.
      html += `<button class="card-action-btn primary" onclick="placeSetupTreasure(${i})">${t("poser")}</button>`;
    } else if (c.type === "battle") {
      html += `<button class="card-action-btn" onclick="startBattle(${i})" ${disabled ? 'disabled' : ''}>${t("attaquer")}</button>`;
    } else {
      html += `<button class="card-action-btn" onclick="playSpecial(${i})" ${disabled ? 'disabled' : ''}>${t("jouer")}</button>`;
    }
    html += `</div>`;
  });
  html += `</div>`;

  if (state.phase === "opponent") html += `<p style="color: var(--paper-darker); font-size: 0.8rem;">${t("adversaireTour")}</p>`;

  html += `<div class="rules-recap"><strong>${t("rulesTitle")}</strong> ${t("rulesText")}</div>`;

  const ingredientCards = TREASURES.filter(c => c.ingredient);
  const sellableCards = TREASURES.filter(c => !c.ingredient && c.sell);
  const passiveCards = TREASURES.filter(c => !c.ingredient && !c.sell);

  html += `<details class="cardex"><summary>${t("indexTitle")}</summary><div class="cardex-grid">`;
  html += `<div class="ce" style="grid-column:1/-1; color:var(--sickly); font-family:'IM Fell English SC',serif; font-size:0.85rem; margin-top:4px;">${t("catIngredients")}</div>`;
  ingredientCards.forEach(c => { html += `<div class="ce"><b>${c.n}</b> — ${cardDesc(c)}</div>`; });
  html += `<div class="ce" style="grid-column:1/-1; color:#8a9aac; font-family:'IM Fell English SC',serif; font-size:0.85rem; margin-top:8px;">${t("catSell")}</div>`;
  sellableCards.forEach(c => { html += `<div class="ce"><b>${c.n}</b> — ${cardDesc(c)}</div>`; });
  html += `<div class="ce" style="grid-column:1/-1; color:#9a7ec0; font-family:'IM Fell English SC',serif; font-size:0.85rem; margin-top:8px;">${t("catPassive")}</div>`;
  passiveCards.forEach(c => { html += `<div class="ce"><b>${c.n}</b> — ${cardDesc(c)}</div>`; });
  html += `<div class="ce" style="grid-column:1/-1; color:#e8a888; font-family:'IM Fell English SC',serif; font-size:0.85rem; margin-top:8px;">${t("catBattle")}</div>`;
  BATTLE_CARDS.forEach(c => { html += `<div class="ce"><b>${c.n}</b> (ATT ${c.a ?? "?"} / DEF ${c.d ?? "?"}) — ${cardDesc(c)}</div>`; });
  html += `<div class="ce" style="grid-column:1/-1; color:#b8a8e0; font-family:'IM Fell English SC',serif; font-size:0.85rem; margin-top:8px;">${t("catSpecial")}</div>`;
  SPECIAL_CARDS.forEach(c => { html += `<div class="ce"><b>${c.n}</b> (niv.${c.level}) — ${cardDesc(c)}</div>`; });
  html += `</div></details>`;

  app.innerHTML = html;
  document.getElementById("app-aside").innerHTML = asideHtml;

  let logHtml = "";
  state.log.forEach(m => { logHtml += `<p class="${m.cls}">${m.text}</p>`; });
  if (state.log.length === 0) logHtml = `<p style="color: var(--paper-darker); font-style: italic;">Le journal des actions s'affichera ici au fil de la partie.</p>`;
  const logEl2 = document.getElementById("app-log");
  logEl2.innerHTML = logHtml;
  logEl2.scrollTop = logEl2.scrollHeight;

  if (state.phase === "opponent") setTimeout(playOpponentTurn, 900);
}

newGame();
initControls();
</script>
</body>
</html>
